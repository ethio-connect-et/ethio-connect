# Trivy vulnerability ignore policy
# Syntax: https://aquasecurity.github.io/trivy/latest/docs/configuration/filtering/#trivyignorenoyaml
#
# POLICY:
#   Only CVEs meeting ALL of these criteria are suppressed here:
#     1. Status "affected" with NO fixed version available in Debian 12 (Bookworm), OR
#        status "fix_deferred" (Debian has explicitly deferred the fix).
#     2. Reviewed and assessed as not exploitable in these minimal distroless containers.
#
#   CVEs that ARE fixable are addressed directly in the Dockerfiles via the
#   `security-patcher` stage (libssl3 ≥ 3.0.19-1~deb12u2) and are NOT listed here.
#
# Last reviewed: 2026-05-06 against trivy-scan-2026-05-06_11-04-53.md

