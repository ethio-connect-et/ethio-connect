name: Promote Environment

on:
  workflow_dispatch:
    inputs:
      from_environment:
        description: 'Source environment (metadata only)'
        required: true
        type: choice
        options: [testing, staging]
      to_environment:
        description: 'Target environment (metadata only)'
        required: true
        type: choice
        options: [staging, production]

permissions: {}

jobs:
  promotion_metadata_only:
    name: Promote · Metadata Only (Deprecated Legacy Mode)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
      - name: Legacy mode warning banner
        shell: bash
        run: |
          {
            echo "## ⚠️ Legacy Promotion Workflow"
            echo ""
            echo "This workflow no longer performs image re-tagging or production GitOps changes."
            echo "Use manifest-repository PR promotion flow instead."
            echo ""
            echo "Requested path: \
\`${{ github.event.inputs.from_environment }}\` -> \
\`${{ github.event.inputs.to_environment }}\`."
          } >> "$GITHUB_STEP_SUMMARY"
