name: Promote Manifest (Non-Prod)

on:
  push:
    branches:
      - testing
      - staging

concurrency:
  group: promote-manifest-nonprod-${{ github.ref_name }}
  cancel-in-progress: false

env:
  CI: true
  NODE_VERSION: '22.20.0'
  PNPM_VERSION: '10.20.0'
  DOCKER_BUILDKIT: 1

jobs:
  dispatch_to_manifest_nonprod:
    name: Manifest · Dispatch (Non-Prod)
    runs-on: self-hosted
    timeout-minutes: 15
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 1

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm fetch --frozen-lockfile && pnpm install --frozen-lockfile --prefer-offline

      - name: Log in to GHCR
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve, validate, and dispatch non-prod manifest promotions
        env:
          GH_TOKEN: ${{ secrets.MANIFEST_REPOSITORY_DISPATCH_TOKEN }}
          MANIFEST_REPOSITORY_DISPATCH_TOKEN: ${{ secrets.MANIFEST_REPOSITORY_DISPATCH_TOKEN }}
          PROMOTED_TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          source scripts/manifest-dispatch.sh

          projects_json="$(pnpm nx show projects --withTarget docker:build --json)"
          projects="$(jq -r '.[]' <<< "$projects_json")"
          validate_dispatch_preconditions "${{ github.ref_name }}" "$projects"

          target_env="$(map_source_to_target_env "${{ github.ref_name }}")"

          {
            echo "## Manifest Dispatch (Non-Prod)"
            echo ""
            echo "| App | Source Branch | Source Image | Digest | Target Env |"
            echo "|---|---|---|---|---|"
          } >> "$GITHUB_STEP_SUMMARY"

          dispatch_with_retry() {
            local payload="$1"
            local max_attempts=5
            local attempt=1
            local delay_seconds=2

            while (( attempt <= max_attempts )); do
              if gh api repos/ethio-connect-et/ethio-connect-manifest/dispatches \
                --method POST \
                -H "Accept: application/vnd.github+json" \
                --input - <<<"$payload"; then
                return 0
              fi

              if (( attempt == max_attempts )); then
                echo "::error::repository_dispatch failed after ${max_attempts} attempts"
                return 1
              fi

              echo "::warning::repository_dispatch attempt ${attempt}/${max_attempts} failed; retrying in ${delay_seconds}s"
              sleep "$delay_seconds"
              delay_seconds=$(( delay_seconds * 2 ))
              attempt=$(( attempt + 1 ))
            done
          }

          while IFS= read -r project; do
            [[ -z "$project" ]] && continue
            app="${project#@ethio-connect/}"
            image_ref="ghcr.io/ethio-connect-et/${app}:${PROMOTED_TAG}"

            echo "Resolving digest for ${image_ref}..."
            
            # Add retry loop to handle race condition with build workflow
            digest=""
            max_inspect_attempts=15
            inspect_attempt=1
            while (( inspect_attempt <= max_inspect_attempts )); do
              digest="$(docker buildx imagetools inspect "$image_ref" --format '{{json .Manifest.Digest}}' 2>/dev/null | tr -d '"' || echo "")"
              if [[ -n "$digest" && "$digest" =~ $DIGEST_REGEX ]]; then
                break
              fi
              echo "Waiting for image ${image_ref} to be available (attempt ${inspect_attempt}/${max_inspect_attempts})..."
              sleep 20
              inspect_attempt=$(( inspect_attempt + 1 ))
            done

            [[ "$digest" =~ $DIGEST_REGEX ]] || {
              echo "::error::Invalid digest for ${image_ref} after ${max_inspect_attempts} attempts: ${digest}"
              exit 1
            }

            payload="$(build_dispatch_payload "$app" "$digest" "$target_env")"
            dispatch_with_retry "$payload"

            echo "| \`${app}\` | \`${{ github.ref_name }}\` | \`${image_ref}\` | \`${digest}\` | \`${target_env}\` |" >> "$GITHUB_STEP_SUMMARY"
          done <<< "$projects"
