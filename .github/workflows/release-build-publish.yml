name: Release Build and Publish

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      prerelease:
        required: false
        type: boolean
        default: false
      changelog:
        required: false
        type: string
      scan_gate_override:
        required: false
        type: boolean
        default: false
      scan_gate_override_reason:
        required: false
        type: string
        default: ''
    secrets:
      NX_CLOUD_ACCESS_TOKEN:
        required: true
    outputs:
      version:
        value: ${{ jobs.build_publish.outputs.version }}
      docker_version:
        value: ${{ jobs.build_publish.outputs.docker_version }}
      short_sha:
        value: ${{ jobs.build_publish.outputs.short_sha }}
      scan_gate_status:
        value: ${{ jobs.build_publish.outputs.scan_gate_status }}

env:
  CI: true
  NODE_VERSION: '24.11.0'
  PNPM_VERSION: '10.20.0'
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

jobs:
  build_publish:
    runs-on: self-host-runner
    timeout-minutes: 30
    outputs:
      version: ${{ steps.context.outputs.version }}
      docker_version: ${{ steps.release-metadata.outputs.docker_version }}
      short_sha: ${{ steps.release-metadata.outputs.short_sha }}
      scan_gate_status: ${{ steps.publish-targets.outputs.scan_gate_status }}
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v4.2.2
        with:
          fetch-depth: 0

      - name: Resolve release context and validate version
        id: context
        shell: bash
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"
          prerelease="${{ inputs.prerelease }}"
          if [[ "${{ github.event_name }}" == "workflow_call" && -z "$version" ]]; then
            version="${GITHUB_REF#refs/tags/}"
          fi

          if [[ ! "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Version must be semver-like, for example v1.2.3 or v1.2.3-rc.1"
            exit 1
          fi

          if [[ "$version" == *-* ]]; then
            prerelease=true
          fi

          if [[ "${{ inputs.scan_gate_override }}" == "true" ]] && [[ -z "${{ inputs.scan_gate_override_reason }}" ]]; then
            echo "::error::scan_gate_override_reason is required when scan_gate_override=true"
            exit 1
          fi

          {
            echo "version=$version"
            echo "prerelease=$prerelease"
          } >> "$GITHUB_OUTPUT"

      - uses: ./.github/actions/setup-nx-node
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Ensure release commit belongs to main
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "::error::Releases are only allowed from commits reachable from origin/main. Tagged commit: $GITHUB_SHA"
            exit 1
          fi

      - name: Resolve release metadata
        id: release-metadata
        shell: bash
        run: |
          set -euo pipefail
          short_sha="$(git rev-parse --short=12 HEAD)"
          version="${{ steps.context.outputs.version }}"
          docker_version="${version#v}"
          {
            echo "short_sha=$short_sha"
            echo "docker_version=$docker_version"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.11.1
      - name: Authenticate with GitHub Container Registry
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Nx release versions for all groups
        shell: bash
        run: |
          set -euo pipefail
          docker_version="${{ steps.release-metadata.outputs.docker_version }}"

          for group in shared-libs central-hub customer-portal vendor-portal; do
            echo "Processing release group: $group with version $docker_version"
            pnpm nx release version "$docker_version" --groups "$group" --stage-changes=false --git-commit=false --git-tag=false
          done

          # Manually create .docker-version files to satisfy the @nx/docker:release-publish executor,
          # bypassing the problematic docker tag behavior of the nx release version command.
          while IFS= read -r project; do
            root=$(pnpm nx show project "$project" --json | jq -r .root)
            mkdir -p "tmp/$root"
            echo "${docker_version}" > "tmp/$root/.docker-version"
            echo "Created tmp/$root/.docker-version with tag ${docker_version}"
          done < <(pnpm nx show projects --projects 'tag:release:publish' --json | jq -r '.[] | select(startswith("@ethio-connect/"))')

      - name: Build and publish docker images via Nx targets
        id: publish-targets
        shell: bash
        run: |
          set -euo pipefail
          docker_version="${{ steps.release-metadata.outputs.docker_version }}"
          short_sha="${{ steps.release-metadata.outputs.short_sha }}"

          shared_libs_projects="@ethio-connect/api-common,@ethio-connect/api-features,@ethio-connect/frontend-features,@ethio-connect/ui-components,@ethio-connect/ethioconnect"
          central_hub_projects="@ethio-connect/central-hub-api,@ethio-connect/central-hub-dashboard,@ethio-connect/central-hub-public-dashboard"
          customer_portal_projects="@ethio-connect/customer-portal-api,@ethio-connect/customer-portal-dashboard"
          vendor_portal_projects="@ethio-connect/vendor-api-server,@ethio-connect/vendor-portal-dashboard"

          export IMAGE_TAG="$docker_version"
          export BRANCH_TAG="$short_sha"
          export BUILD_NUMBER="$short_sha"
          export COMMIT_SHA="${GITHUB_SHA}"
          export VERSION="$docker_version"

          echo "Building docker images for docker-enabled release groups"
          pnpm nx run-many -t docker:build --projects "$central_hub_projects,$customer_portal_projects,$vendor_portal_projects"

          mkdir -p artifacts/trivy/reports
          sudo apt-get update -y
          sudo apt-get install -y wget
          wget -qO- https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin

          failed=0
          total_critical=0
          total_high=0
          {
            echo "## Container Security Scan (Trivy)"
            echo ""
            echo "| App | Image Ref | CRITICAL | HIGH | Gate |"
            echo "|---|---|---:|---:|---|"
          } >> "$GITHUB_STEP_SUMMARY"

          for group_projects in "$central_hub_projects" "$customer_portal_projects" "$vendor_portal_projects"; do
            IFS=',' read -ra projects <<< "$group_projects"
            for project in "${projects[@]}"; do
              image="${project#@ethio-connect/}"
              image_ref="ghcr.io/ethio-connect-et/${image}:${docker_version}"
              safe_name="${image//\//-}"
              json_report="artifacts/trivy/reports/${safe_name}-${docker_version}.json"
              sarif_report="artifacts/trivy/reports/${safe_name}-${docker_version}.sarif"

              trivy image --ignorefile .trivyignore.yaml --scanners vuln --format json --output "$json_report" "$image_ref"
              trivy image --ignorefile .trivyignore.yaml --scanners vuln --format sarif --output "$sarif_report" "$image_ref"

              critical_count="$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' "$json_report")"
              high_count="$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' "$json_report")"
              total_critical=$((total_critical + critical_count))
              total_high=$((total_high + high_count))

              gate="pass"
              if (( critical_count > 0 || high_count > 0 )); then
                gate="fail"
                failed=1
              fi
              echo "| \`${image}\` | \`${image_ref}\` | ${critical_count} | ${high_count} | \`${gate}\` |" >> "$GITHUB_STEP_SUMMARY"
            done
          done

          {
            echo ""
            echo "- Aggregate CRITICAL: ${total_critical}"
            echo "- Aggregate HIGH: ${total_high}"
          } >> "$GITHUB_STEP_SUMMARY"

          if (( failed == 1 )); then
            if [[ "${{ inputs.scan_gate_override }}" == "true" ]]; then
              echo "::warning::Scan gate override enabled. Continuing despite HIGH/CRITICAL vulnerabilities."
              {
                echo "### Scan Gate Override"
                echo "- Override: \`true\`"
                echo "- Reason: \`${{ inputs.scan_gate_override_reason || 'no reason provided' }}\`"
              } >> "$GITHUB_STEP_SUMMARY"
              echo "scan_gate_status=overridden" >> "$GITHUB_OUTPUT"
            else
              echo "scan_gate_status=failed" >> "$GITHUB_OUTPUT"
              echo "::error::Container scan gate failed due to HIGH/CRITICAL vulnerabilities."
              exit 1
            fi
          else
            echo "scan_gate_status=passed" >> "$GITHUB_OUTPUT"
          fi

          : > release-publish.log
          : > published-images.md
          {
            echo "### Published Docker Images"
            echo ""
          } >> published-images.md
          for group in shared-libs central-hub customer-portal vendor-portal; do
            case "$group" in
              shared-libs) group_projects="$shared_libs_projects" ;;
              central-hub) group_projects="$central_hub_projects" ;;
              customer-portal) group_projects="$customer_portal_projects" ;;
              vendor-portal) group_projects="$vendor_portal_projects" ;;
              *) echo "::error::Unknown release group '$group'" ; exit 1 ;;
            esac

            echo "Publishing release group through target execution: $group"
            pnpm nx run-many -t nx-release-publish --projects "$group_projects" --output-style=stream | tee -a release-publish.log

            IFS=',' read -ra projects <<< "$group_projects"
            for project in "${projects[@]}"; do
              image="${project#@ethio-connect/}"
              {
                echo "- ghcr.io/ethio-connect-et/${image}:${docker_version}"
                echo "  - ghcr.io/ethio-connect-et/${image}:${short_sha}"
              } >> published-images.md
            done
          done

          cat published-images.md >> "$GITHUB_STEP_SUMMARY"

          {
            echo "images_markdown<<EOF"
            cat published-images.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Verify published tags resolve to immutable manifests
        shell: bash
        run: |
          set -euo pipefail
          docker_version="${{ steps.release-metadata.outputs.docker_version }}"
          short_sha="${{ steps.release-metadata.outputs.short_sha }}"

          while IFS= read -r project; do
            app="${project#@ethio-connect/}"
            version_ref="ghcr.io/ethio-connect-et/${app}:${docker_version}"
            sha_ref="ghcr.io/ethio-connect-et/${app}:${short_sha}"

            version_digest="$(docker buildx imagetools inspect "$version_ref" --format '{{json .Manifest.Digest}}' | tr -d '"')"
            sha_digest="$(docker buildx imagetools inspect "$sha_ref" --format '{{json .Manifest.Digest}}' | tr -d '"')"

            [[ "$version_digest" =~ ^sha256:[a-f0-9]{64}$ ]] || { echo "::error::Invalid version digest for $app: $version_digest"; exit 1; }
            [[ "$sha_digest" =~ ^sha256:[a-f0-9]{64}$ ]] || { echo "::error::Invalid sha digest for $app: $sha_digest"; exit 1; }
            [[ "$version_digest" == "$sha_digest" ]] || { echo "::error::Digest mismatch for $app between ${docker_version} and ${short_sha}"; exit 1; }

            echo "Verified $app => $version_digest"
          done < <(pnpm nx show projects --projects 'tag:release:docker' --json | jq -r '.[] | select(startswith("@ethio-connect/"))')

      - name: Upload container scan reports
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808
        with:
          name: trivy-scan-reports-release-${{ steps.context.outputs.version }}-${{ github.run_id }}
          path: artifacts/trivy/reports
          retention-days: 30

      - name: Generate release changelog from git history
        id: changelog
        shell: bash
        run: |
          set -euo pipefail
          override="${{ inputs.changelog }}"
          version="${{ steps.context.outputs.version }}"
          previous_tag="$(git tag --sort=-creatordate --list 'v*' | grep -vx "$version" | head -1 || true)"

          if [[ -n "$override" ]]; then
            {
              echo "body<<EOF"
              printf '%s\n' "$override"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -n "$previous_tag" ]]; then
            changes="$(git log --pretty=format:'- %s (%h)' "${previous_tag}..HEAD" -- apps libs .github/workflows)"
          else
            changes="$(git log --pretty=format:'- %s (%h)' -n 50 -- apps libs .github/workflows)"
          fi

          {
            echo "body<<EOF"
            echo "## Release ${version}"
            echo ""
            if [[ -n "$previous_tag" ]]; then
              echo "Previous tag: \`${previous_tag}\`"
              echo ""
            fi
            echo "### Changes"
            if [[ -n "$changes" ]]; then
              printf '%s\n' "$changes"
            else
              echo "- No workspace changes detected in the release range."
            fi
            echo ""
            echo "${{ steps.publish-targets.outputs.images_markdown }}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631
        with:
          tag_name: ${{ steps.context.outputs.version }}
          target_commitish: ${{ github.sha }}
          name: Release ${{ steps.context.outputs.version }}
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: ${{ steps.context.outputs.prerelease == 'true' }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release evidence payload
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          jq -n \
            --arg version "${{ steps.context.outputs.version }}" \
            --arg docker_version "${{ steps.release-metadata.outputs.docker_version }}" \
            --arg short_sha "${{ steps.release-metadata.outputs.short_sha }}" \
            --arg release_sha "${GITHUB_SHA}" \
            --arg created_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{version:$version,docker_version:$docker_version,short_sha:$short_sha,release_sha:$release_sha,created_at:$created_at}' \
            > "artifacts/release-evidence-${{ steps.context.outputs.version }}-${{ github.run_id }}.json"

      - name: Upload release evidence artifact
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808
        with:
          name: release-evidence-${{ steps.context.outputs.version }}-${{ github.run_id }}
          path: artifacts/release-evidence-${{ steps.context.outputs.version }}-${{ github.run_id }}.json
          retention-days: 90

      - name: Create release publish manifest artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          docker_version="${{ steps.release-metadata.outputs.docker_version }}"
          manifest_path="artifacts/publish-manifest-${{ steps.context.outputs.version }}-${{ github.run_id }}.json"
          while IFS= read -r project; do
            app="${project#@ethio-connect/}"
            image_ref="ghcr.io/ethio-connect-et/${app}:${docker_version}"
            digest="$(docker buildx imagetools inspect "$image_ref" --format '{{json .Manifest.Digest}}' | tr -d '"')"
            jq -nc \
              --arg project "$project" \
              --arg app "$app" \
              --arg image_ref "$image_ref" \
              --arg digest "$digest" \
              --arg source_sha "${GITHUB_SHA}" \
              --arg tag "$docker_version" \
              --arg artifact_run_id "${GITHUB_RUN_ID}" \
              '{project:$project,app:$app,image_ref:$image_ref,digest:$digest,source_sha:$source_sha,tag:$tag,artifact_run_id:$artifact_run_id,attestation_status:"pending"}'
          done < <(pnpm nx show projects --projects 'tag:release:publish' --json | jq -r '.[] | select(startswith("@ethio-connect/"))') \
            | jq -sc . > "$manifest_path"

      - name: Upload release publish manifest artifact
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808
        with:
          name: publish-manifest-${{ steps.context.outputs.version }}-${{ github.run_id }}
          path: artifacts/publish-manifest-${{ steps.context.outputs.version }}-${{ github.run_id }}.json
          retention-days: 90
