name: Reusable Build, Test, and Lint

on:
  workflow_call:
    inputs:
      ref_name:
        required: true
        type: string
      event_name:
        required: true
        type: string
      pull_request_draft:
        required: false
        type: boolean
        default: false
      pull_request_number:
        required: false
        type: number
    secrets:
      NX_CLOUD_ACCESS_TOKEN:
        required: true

env:
  CI: true
  NODE_VERSION: '24.11.0'
  PNPM_VERSION: '10.20.0'
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

jobs:
  quality_gate:
    name: Quality · Gate
    runs-on: self-hosted
    timeout-minutes: 35
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with: { fetch-depth: 0, filter: 'tree:0' }

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with: { version: '${{ env.PNPM_VERSION }}', run_install: false }

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          {
            node-version: '${{ env.NODE_VERSION }}',
            cache: pnpm,
            cache-dependency-path: pnpm-lock.yaml,
          }

      - name: Install dependencies
        run: pnpm fetch --frozen-lockfile && pnpm install --frozen-lockfile --prefer-offline

      - name: Configure affected range for PRs and testing
        if: inputs.event_name == 'pull_request' || inputs.ref_name == 'testing'
        shell: bash
        run: |
          set -euo pipefail
          base_ref="${{ inputs.event_name == 'pull_request' && github.base_ref || 'development' }}"
          git fetch --no-tags origin "${base_ref}:refs/remotes/origin/${base_ref}"
          echo "NX_BASE=origin/${base_ref}" >> "$GITHUB_ENV"
          echo "NX_HEAD=HEAD" >> "$GITHUB_ENV"

      - uses: nrwl/nx-set-shas@v4
        if: inputs.event_name != 'pull_request' && inputs.ref_name != 'testing'

      - name: Check formatting
        run: pnpm nx format:check --base="$NX_BASE" --head="$NX_HEAD"

      - name: Run affected quality tasks
        run: pnpm nx affected -t lint test build --base="$NX_BASE" --head="$NX_HEAD" --parallel=3 --outputStyle=static
