name: Reusable Build, Test, and Lint

on:
  workflow_call:
    inputs:
      projects_json:
        required: true
        type: string
      ref_name:
        required: true
        type: string
      event_name:
        required: true
        type: string
      pull_request_draft:
        required: false
        type: boolean
        default: false
      pull_request_number:
        required: false
        type: number
    secrets:
      NX_CLOUD_ACCESS_TOKEN:
        required: true

env:
  CI: true
  NODE_VERSION: '24.11.0'
  PNPM_VERSION: '10.20.0'
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

jobs:
  quality_gate:
    name: Quality · Gate
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v4.2.2
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-nx-node
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Configure affected range for PRs and testing
        if: inputs.event_name == 'pull_request' || inputs.ref_name == 'testing'
        shell: bash
        run: |
          set -euo pipefail
          base_ref="${{ inputs.event_name == 'pull_request' && github.base_ref || 'development' }}"
          git fetch --no-tags origin "${base_ref}:refs/remotes/origin/${base_ref}"
          echo "NX_BASE=origin/${base_ref}" >> "$GITHUB_ENV"
          echo "NX_HEAD=HEAD" >> "$GITHUB_ENV"

      - uses: nrwl/nx-set-shas@afb73a62d26e41464e9254689e1fd6122ee683c1
        if: inputs.event_name != 'pull_request' && inputs.ref_name != 'testing'

      - name: Check formatting
        run: pnpm nx format:check --base="$NX_BASE" --head="$NX_HEAD"

      - name: Enforce cache policy
        run: node tools/ci/check-cache-policy.mjs

      - name: Run scoped quality tasks
        shell: bash
        run: |
          set -euo pipefail
          start_epoch=$(date +%s)
          projects=$(jq -r 'join(",")' <<< '${{ inputs.projects_json }}')
          affected_count=$(jq 'length' <<< '${{ inputs.projects_json }}')
          if [[ -z "$projects" ]]; then
            echo 'No quality projects to process.'
            echo '{"lane":"quality","affected_count":0,"cache_hits":0,"cache_misses":0,"duration_seconds":0,"nx_cloud_run_url":""}' > ci-metrics-quality.json
            exit 0
          fi
          pnpm nx run-many -t lint test build --projects "$projects" --parallel=3 --outputStyle=static | tee nx-quality.log

          end_epoch=$(date +%s)
          duration=$((end_epoch - start_epoch))
          cache_hits=$(rg -c "from cache" nx-quality.log || true)
          cache_misses=$(rg -c "Successfully ran target" nx-quality.log || true)
          nx_cloud_run_url=$(rg -o "https://cloud\.nx\.app/runs/[A-Za-z0-9_-]+" -N nx-quality.log | tail -n1 || true)

          jq -n \
            --argjson affected_count "$affected_count" \
            --argjson cache_hits "${cache_hits:-0}" \
            --argjson cache_misses "${cache_misses:-0}" \
            --argjson duration_seconds "$duration" \
            --arg nx_cloud_run_url "${nx_cloud_run_url:-}" \
            '{lane:"quality",affected_count:$affected_count,cache_hits:$cache_hits,cache_misses:$cache_misses,duration_seconds:$duration_seconds,nx_cloud_run_url:$nx_cloud_run_url}' > ci-metrics-quality.json

      - name: Upload quality metrics
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808
        with:
          name: ci-metrics-quality
          path: ci-metrics-quality.json
