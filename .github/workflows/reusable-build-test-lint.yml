name: Reusable Build, Test, and Lint

on:
  workflow_call:
    inputs:
      projects_json:
        required: true
        type: string
      ref_name:
        required: true
        type: string
      event_name:
        required: true
        type: string
      pull_request_draft:
        required: false
        type: boolean
        default: false
      pull_request_number:
        required: false
        type: number
    secrets:
      NX_CLOUD_ACCESS_TOKEN:
        required: true

env:
  CI: true
  NODE_VERSION: '24.11.0'
  PNPM_VERSION: '10.20.0'
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

jobs:
  quality_gate:
    name: Quality · Gate
    runs-on: self-host-runner
    timeout-minutes: 35
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v4.2.2
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-nx-node
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Configure affected range for PRs and testing
        if: inputs.event_name == 'pull_request' || inputs.ref_name == 'testing'
        shell: bash
        run: |
          set -euo pipefail
          base_ref="${{ inputs.event_name == 'pull_request' && github.base_ref || 'development' }}"
          git fetch --no-tags origin "${base_ref}:refs/remotes/origin/${base_ref}"
          echo "NX_BASE=origin/${base_ref}" >> "$GITHUB_ENV"
          echo "NX_HEAD=HEAD" >> "$GITHUB_ENV"

      - uses: nrwl/nx-set-shas@afb73a62d26e41464e9254689e1fd6122ee683c1
        if: inputs.event_name != 'pull_request' && inputs.ref_name != 'testing'

      - name: Check formatting
        run: pnpm nx format:check --base="$NX_BASE" --head="$NX_HEAD"

      - name: Run scoped quality tasks
        shell: bash
        run: |
          set -euo pipefail
          projects=$(jq -r 'join(",")' <<< '${{ inputs.projects_json }}')
          if [[ -z "$projects" ]]; then
            echo 'No quality projects to process.'
            exit 0
          fi
          pnpm nx run-many -t lint test build --projects "$projects" --parallel=3 --outputStyle=static
