name: Reusable Build, Test, and Lint

on:
  workflow_call:
    inputs:
      projects_json:
        required: true
        type: string
      ref_name:
        required: true
        type: string
      event_name:
        required: true
        type: string
      nx_base:
        required: true
        type: string
      nx_head:
        required: true
        type: string
      pull_request_draft:
        required: false
        type: boolean
        default: false
      pull_request_number:
        required: false
        type: number
    secrets:
      NX_CLOUD_ACCESS_TOKEN:
        required: true

env:
  CI: true
  NODE_VERSION: '24.11.0'
  PNPM_VERSION: '10.20.0'
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

jobs:
  quality_gate:
    name: Quality · Gate
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v4.2.2
        with:
          fetch-depth: 0

      - id: setup_nx_node
        uses: ./.github/actions/setup-nx-node
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Enforce cache policy
        run: node tools/ci/check-cache-policy.mjs

      - name: Run scoped quality tasks
        shell: bash
        run: |
          set -euo pipefail
          start_epoch=$(date +%s)
          projects=$(jq -r 'join(",")' <<< '${{ inputs.projects_json }}')
          affected_count=$(jq 'length' <<< '${{ inputs.projects_json }}')
          if [[ -z "$projects" ]]; then
            echo 'No quality projects in optimization hint; executing affected lane truth from nx_base/nx_head.'
          fi
          pnpm nx affected -t typecheck,lint,test,build --base="${{ inputs.nx_base }}" --head="${{ inputs.nx_head }}" --parallel=3 --outputStyle=static | tee nx-quality.log

          if rg -q "No tasks were run" nx-quality.log; then
            echo 'No affected tasks for quality lane. Emitting deterministic skip artifact.'
            jq -n \
              --arg dependency_cache_hit "${{ steps.setup_nx_node.outputs.dependency-cache-hit || 'false' }}" \
              --arg dependency_cache_key "${{ steps.setup_nx_node.outputs.dependency-cache-key || '' }}" \
              '{lane:"quality",status:"skipped-no-affected",affected_count:0,cache_hits:0,cache_misses:0,duration_seconds:0,dependency_cache_hit:($dependency_cache_hit == "true"),dependency_cache_key:$dependency_cache_key,nx_cloud_run_url:""}' > ci-metrics-quality.json
            exit 0
          fi

          end_epoch=$(date +%s)
          duration=$((end_epoch - start_epoch))
          cache_hits=$(rg -c "from cache" nx-quality.log || true)
          cache_misses=$(rg -c "Successfully ran target" nx-quality.log || true)
          nx_cloud_run_url=$(rg -o "https://cloud\.nx\.app/runs/[A-Za-z0-9_-]+" -N nx-quality.log | tail -n1 || true)

          jq -n \
            --argjson affected_count "$affected_count" \
            --argjson cache_hits "${cache_hits:-0}" \
            --argjson cache_misses "${cache_misses:-0}" \
            --argjson duration_seconds "$duration" \
            --arg dependency_cache_hit "${{ steps.setup_nx_node.outputs.dependency-cache-hit || 'false' }}" \
            --arg dependency_cache_key "${{ steps.setup_nx_node.outputs.dependency-cache-key || '' }}" \
            --arg nx_cloud_run_url "${nx_cloud_run_url:-}" \
            '{lane:"quality",affected_count:$affected_count,cache_hits:$cache_hits,cache_misses:$cache_misses,duration_seconds:$duration_seconds,dependency_cache_hit:($dependency_cache_hit == "true"),dependency_cache_key:$dependency_cache_key,nx_cloud_run_url:$nx_cloud_run_url}' > ci-metrics-quality.json

      - name: Upload quality metrics
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808
        with:
          name: ci-metrics-quality
          path: ci-metrics-quality.json
