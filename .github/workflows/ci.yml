name: Application Continuous Integration

on:
  pull_request:
    branches:
      - development
      - testing
      - staging
      - main
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
    types: [checks_requested]
  push:
    branches:
      - development
      - testing
      - staging
      - main
    paths:
      - ".github/workflows/**"
      - "apps/**"
      - "libs/**"
      - "deploy/**"
      - "scripts/**"
      - "nx.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
  workflow_dispatch:

permissions: {}

env:
  NODE_VERSION: "24.11.0"
  PNPM_VERSION: "10.20.0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref || github.sha }}
  cancel-in-progress: ${{ github.event_name != 'push' }}

jobs:
  governance_policy_checks:
    name: Governance Branch and Workflow Policy
    permissions:
      contents: read
    uses: ./.github/workflows/ci-policy-governance.yml
    with:
      node_version: "24.11.0"
      pnpm_version: "10.20.0"
      event_name: ${{ github.event_name }}
      base_ref: ${{ github.base_ref }}
      head_ref: ${{ github.head_ref }}
    secrets: inherit

  lint_affected_required:
    name: Required Affected Lint Gate
    permissions:
      contents: read
    needs: [governance_policy_checks]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.3
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.1.0
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Derive Nx SHAs
        id: nx-shas
        uses: nrwl/nx-set-shas@afb73a62d26e41464e9254689e1fd6122ee683c1 # v4.3.0

      - name: Resolve Nx base and head
        run: |
          nx_base="${{ steps.nx-shas.outputs.base }}"
          nx_head="${{ steps.nx-shas.outputs.head }}"
          if [ -z "$nx_base" ]; then nx_base="$(git rev-parse HEAD~1)"; fi
          if [ -z "$nx_head" ]; then nx_head="$(git rev-parse HEAD)"; fi
          {
            echo "NX_BASE=${nx_base}"
            echo "NX_HEAD=${nx_head}"
          } >> "$GITHUB_ENV"

      - name: Lint affected projects (module boundaries enforced)
        run: pnpm exec nx affected -t lint --base="$NX_BASE" --head="$NX_HEAD" --parallel=1

  quality_and_security:
    name: Quality and Security Gate
    permissions:
      actions: read
      contents: read
      pull-requests: write
      security-events: write
    needs: [governance_policy_checks, lint_affected_required]
    uses: ./.github/workflows/ci-quality-security.yml
    with:
      node_version: "24.11.0"
      pnpm_version: "10.20.0"
      event_name: ${{ github.event_name }}
      ref_name: ${{ github.ref_name }}
      base_ref: ${{ github.base_ref }}
    secrets: inherit

  publish_container_images:
    name: Publish Signed Application Images
    needs: [quality_and_security]
    if: >-
      github.event_name == 'push' &&
      (
        github.ref == 'refs/heads/testing' ||
        github.ref == 'refs/heads/staging' ||
        github.ref == 'refs/heads/main'
      ) &&
      !contains(github.event.head_commit.message, '[skip ci]')
    permissions:
      contents: read
      id-token: write
      packages: write
    uses: ./.github/workflows/ci-image-publish-attest.yml
    with:
      node_version: "24.11.0"
      pnpm_version: "10.20.0"
    secrets: inherit

  dispatch_staging_release:
    name: Dispatch Staging Release to Environments
    permissions:
      contents: read
    needs: [publish_container_images]
    if: >-
      needs.publish_container_images.result == 'success' &&
      needs.publish_container_images.outputs['infra_environment'] == 'staging'
    uses: ./.github/workflows/ci-release-dispatch.yml
    with:
      source_sha: ${{ github.sha }}
      source_ref: refs/heads/staging
      target_environment: staging
      image_tag: ${{ needs.publish_container_images.outputs['image_tag'] }}
      release_version: ${{ needs.publish_container_images.outputs['release_version'] }}
      release_schema_version: 1.0.0
      applications_json: ${{ needs.publish_container_images.outputs['applications_json'] }}
      attestation_references_json: ${{ needs.publish_container_images.outputs['attestation_references_json'] }}
    secrets: inherit

  summarize_protected_branch_publish:
    name: Summarize Protected Branch Publish
    permissions:
      contents: read
    needs: [publish_container_images, dispatch_staging_release]
    if: always() && needs.publish_container_images.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Write publish summary
        env:
          INFRA_ENVIRONMENT: ${{ needs.publish_container_images.outputs['infra_environment'] }}
          IMAGE_TAG: ${{ needs.publish_container_images.outputs['image_tag'] }}
          RELEASE_VERSION: ${{ needs.publish_container_images.outputs['release_version'] }}
          DISPATCH_RESULT: ${{ needs.dispatch_staging_release.result }}
        run: |
          {
            echo "## Protected Branch Image Publish"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Environment | \`${INFRA_ENVIRONMENT}\` |"
            echo "| Image Tag | \`${IMAGE_TAG}\` |"
            echo "| Release Version | \`${RELEASE_VERSION}\` |"
            echo "| Staging Dispatch | \`${DISPATCH_RESULT:-not-applicable}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
