name: CI (Compatibility Shim)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [development, testing, staging, main]

permissions:
  contents: read
  actions: read

jobs:
  target_contract_governance:
    name: Target Contract Governance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v4.2.2
      - uses: ./.github/actions/setup-nx-node
      - name: Validate target contract
        run: pnpm run validate:target-contract
      - name: Validate release scope contract
        run: pnpm run validate:release-scope
      - name: Enforce secret handling policy
        run: ./scripts/check-no-plaintext-secrets.sh

  compatibility_notice:
    name: Compatibility Shim
    runs-on: ubuntu-latest
    needs: [target_contract_governance]
    steps:
      - name: CI moved to orchestrator
        run: echo "Primary CI entrypoint is .github/workflows/orchestrator.yml"
