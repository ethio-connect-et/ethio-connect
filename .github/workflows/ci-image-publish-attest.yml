name: Application Image Publish and Attest

on:
  workflow_call:
    inputs:
      node_version:
        required: false
        type: string
        default: "24.11.0"
      pnpm_version:
        required: false
        type: string
        default: "10.20.0"
    outputs:
      infra_environment:
        description: "Protected branch environment for the publish"
        value: ${{ jobs.publish_images_and_attestations.outputs.infra_environment }}
      target_branch:
        description: "Branch that produced the published images"
        value: ${{ jobs.publish_images_and_attestations.outputs.target_branch }}
      image_tag:
        description: "Published image tag"
        value: ${{ jobs.publish_images_and_attestations.outputs.image_tag }}
      release_version:
        description: "Release version identifier"
        value: ${{ jobs.publish_images_and_attestations.outputs.release_version }}
      applications_json:
        description: "Map of application name to immutable image digest reference"
        value: ${{ jobs.publish_images_and_attestations.outputs.applications_json }}
      attestation_references_json:
        description: "Map of application name to attestation subject reference"
        value: ${{ jobs.publish_images_and_attestations.outputs.attestation_references_json }}
permissions:
  contents: read
  id-token: write
  packages: write
  security-events: write

concurrency:
  group: ci-image-publish-${{ github.workflow_ref }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'push' }}

env:
  CI: "true"
  IMAGE_REGISTRY: ghcr.io
  IMAGE_ORG: ethio-connect-sc
  NODE_VERSION: ${{ inputs.node_version }}
  PNPM_VERSION: ${{ inputs.pnpm_version }}
  DOCKER_BUILDKIT: "1"

jobs:
  publish_images_and_attestations:
    name: Publish Images, SBOMs, and Provenance
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
    outputs:
      infra_environment: ${{ steps.deploy_context.outputs.infra_environment }}
      target_branch: ${{ steps.deploy_context.outputs.target_branch }}
      image_tag: ${{ steps.deploy_context.outputs.image_tag }}
      release_version: ${{ steps.deploy_context.outputs.release_version }}
      applications_json: ${{ steps.publish_outputs.outputs.applications_json }}
      attestation_references_json: ${{ steps.publish_outputs.outputs.attestation_references_json }}

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.3
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.1.0
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Derive Nx SHAs
        id: nx-shas
        continue-on-error: true
        uses: nrwl/nx-set-shas@afb73a62d26e41464e9254689e1fd6122ee683c1 # v4.3.0

      - name: Resolve deploy context
        id: deploy_context
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          short_sha="${GITHUB_SHA:0:8}"
          branch="${GITHUB_REF_NAME}"

          case "$branch" in
            testing)
              infra_environment="testing"
              image_tag="testing-${short_sha}"
              release_version="testing-${short_sha}"
              ;;
            staging)
              infra_environment="staging"
              image_tag="staging-${short_sha}"
              release_version="staging-${short_sha}"
              ;;
            main)
              infra_environment="production"
              image_tag="main-${short_sha}"
              release_version="main-${short_sha}"
              ;;
            *)
              echo "::error::Protected branch publishing is only supported for testing, staging, and main." >&2
              exit 1
              ;;
          esac

          {
            echo "infra_environment=${infra_environment}"
            echo "target_branch=${branch}"
            echo "image_tag=${image_tag}"
            echo "release_version=${release_version}"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve deployable Nx projects
        id: projects
        env:
          NX_BASE: ${{ steps.nx-shas.outputs.base }}
          NX_HEAD: ${{ steps.nx-shas.outputs.head }}
        run: |
          all_projects_json="$(pnpm exec nx show projects --withTarget docker:build --json)"
          if [ "$(printf '%s' "$all_projects_json" | jq 'length')" -eq 0 ]; then
            echo "::error::No projects with docker:build targets were found." >&2
            exit 1
          fi

          should_publish="true"
          resolution_mode="all_projects"
          resolution_message="Publishing all projects with docker:build targets."
          projects_json="$all_projects_json"

          if [ -n "${NX_BASE}" ] && [ -n "${NX_HEAD}" ]; then
            if affected_projects_json="$(pnpm exec nx show projects --affected --base="${NX_BASE}" --head="${NX_HEAD}" --withTarget docker:build --json 2>/dev/null)"; then
              if [ "$(printf '%s' "${affected_projects_json}" | jq 'length')" -eq 0 ]; then
                should_publish="false"
                resolution_mode="affected_empty"
                resolution_message="No affected projects with docker:build were detected between ${NX_BASE} and ${NX_HEAD}; image publish and attestation were skipped."
                projects_json='[]'
              else
                resolution_mode="affected"
                resolution_message="Publishing affected projects with docker:build targets between ${NX_BASE} and ${NX_HEAD}."
                projects_json="${affected_projects_json}"
              fi
            else
              resolution_mode="fallback_all_projects"
              resolution_message="Nx SHA derivation was available but affected project resolution failed; falling back to all projects with docker:build targets."
            fi
          else
            resolution_mode="fallback_all_projects"
            resolution_message="Nx SHA derivation failed (missing base/head); falling back to all projects with docker:build targets."
          fi

          projects_csv="$(printf '%s' "$projects_json" | jq -r 'join(",")')"

          {
            echo "projects_json=${projects_json}"
            echo "projects_csv=${projects_csv}"
            echo "should_publish=${should_publish}"
            echo "resolution_mode=${resolution_mode}"
            echo "resolution_message=${resolution_message}"
            echo "nx_base=${NX_BASE}"
            echo "nx_head=${NX_HEAD}"
          } >> "$GITHUB_OUTPUT"

      - name: Start Nx Cloud CI run
        if: env.NX_CLOUD_ACCESS_TOKEN != '' && steps.projects.outputs.should_publish == 'true'
        run: pnpm exec nx start-ci-run --distribute-on="3 linux-medium-js" --stop-agents-after="nx-release-publish" || true

      - name: Log in to GitHub Container Registry
        if: steps.projects.outputs.should_publish == 'true'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v3.3.0
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build application images with Nx
        if: steps.projects.outputs.should_publish == 'true'
        env:
          REGISTRY: ${{ env.IMAGE_REGISTRY }}
          ORG_LC: ${{ env.IMAGE_ORG }}
          IMAGE_TAG: ${{ steps.deploy_context.outputs.image_tag }}
          BUILD_NUMBER: ${{ github.run_number }}
          COMMIT_SHA: ${{ github.sha }}
          BUILD_DATE: ${{ github.event.head_commit.timestamp || github.run_id }}
          REPO_URL: https://github.com/${{ github.repository }}
          VERSION: ${{ steps.deploy_context.outputs.release_version }}
        run: |
          pnpm exec nx run-many \
            -t docker:build \
            --projects="${{ steps.projects.outputs.projects_csv }}" \
            --parallel=3

      - name: Publish application images with Nx
        if: steps.projects.outputs.should_publish == 'true'
        env:
          REGISTRY: ${{ env.IMAGE_REGISTRY }}
          ORG_LC: ${{ env.IMAGE_ORG }}
          IMAGE_TAG: ${{ steps.deploy_context.outputs.image_tag }}
        run: |
          pnpm exec nx run-many \
            -t nx-release-publish \
            --projects="${{ steps.projects.outputs.projects_csv }}" \
            --parallel=3

      - name: Install Trivy
        if: steps.projects.outputs.should_publish == 'true'
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514 # v0.2.3
        with:
          version: v0.63.0

      - name: Install Syft
        if: steps.projects.outputs.should_publish == 'true'
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.20.0

      - name: Install Cosign
        if: steps.projects.outputs.should_publish == 'true'
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3.9.0

      - name: Record image state and attest artifacts
        if: steps.projects.outputs.should_publish == 'true'
        id: record_state
        env:
          COSIGN_YES: "true"
          IMAGE_TAG: ${{ steps.deploy_context.outputs.image_tag }}
          RELEASE_VERSION: ${{ steps.deploy_context.outputs.release_version }}
          REGISTRY: ${{ env.IMAGE_REGISTRY }}
          ORG_LC: ${{ env.IMAGE_ORG }}
          PROJECTS_JSON: ${{ steps.projects.outputs.projects_json }}
        run: |
          applications_json='{}'
          attestation_references_json='{}'
          started_on="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          while IFS= read -r project; do
            app_name="${project##*/}"
            tag_ref="${REGISTRY}/${ORG_LC}/${app_name}:${IMAGE_TAG}"
            digest="$(docker manifest inspect "${tag_ref}" --verbose | jq -r '.[0].Descriptor.digest // .Descriptor.digest')"

            if [ -z "$digest" ] || [ "$digest" = "null" ]; then
              echo "::error::Failed to resolve digest for ${tag_ref}" >&2
              exit 1
            fi

            digest_ref="${REGISTRY}/${ORG_LC}/${app_name}@${digest}"
            digest_sha="${digest#sha256:}"
            predicate_file="provenance-${app_name}.json"

            trivy image \
              --exit-code 0 \
              --severity HIGH,CRITICAL \
              --format sarif \
              --output "trivy-${app_name}.sarif" \
              "${digest_ref}" || true

            syft "${digest_ref}" -o cyclonedx-json="sbom-${app_name}.cyclonedx.json"

            cosign sign "${digest_ref}"

            cat > "${predicate_file}" <<EOF
          {
            "_type": "https://in-toto.io/Statement/v0.1",
            "subject": [
              {
                "name": "${REGISTRY}/${ORG_LC}/${app_name}",
                "digest": {
                  "sha256": "${digest_sha}"
                }
              }
            ],
            "predicateType": "https://slsa.dev/provenance/v1",
            "predicate": {
              "buildDefinition": {
                "buildType": "https://github.com/Attestations/GitHubHostedActions@v1",
                "externalParameters": {
                  "workflow": "${{ github.workflow }}",
                  "repository": "${{ github.repository }}",
                  "ref": "${{ github.ref }}",
                  "release_version": "${RELEASE_VERSION}"
                },
                "internalParameters": {},
                "resolvedDependencies": []
              },
              "runDetails": {
                "builder": {
                  "id": "https://github.com/${{ github.repository }}/.github/workflows/ci-image-publish-attest.yml@${{ github.sha }}"
                },
                "metadata": {
                  "invocationId": "${{ github.run_id }}",
                  "startedOn": "${started_on}"
                }
              }
            }
          }
          EOF

            cosign attest \
              --predicate "${predicate_file}" \
              --type slsaprovenance \
              "${digest_ref}"

            cosign verify \
              --certificate-identity-regexp "https://github.com/${{ github.repository }}/.github/workflows/ci-image-publish-attest.yml@.*" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              "${digest_ref}" > /dev/null

            cosign verify-attestation \
              --type slsaprovenance \
              --certificate-identity-regexp "https://github.com/${{ github.repository }}/.github/workflows/ci-image-publish-attest.yml@.*" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              "${digest_ref}" > /dev/null

            applications_json="$(jq -c --arg app "${app_name}" --arg ref "${digest_ref}" '. + {($app): $ref}' <<<"${applications_json}")"
            attestation_references_json="$(jq -c --arg app "${app_name}" --arg ref "${digest_ref}" '. + {($app): $ref}' <<<"${attestation_references_json}")"
          done < <(printf '%s' "${PROJECTS_JSON}" | jq -r '.[]')

          {
            echo "applications_json=${applications_json}"
            echo "attestation_references_json=${attestation_references_json}"
          } >> "$GITHUB_OUTPUT"

      - name: Upload Trivy SARIF results
        if: always() && steps.projects.outputs.should_publish == 'true' && hashFiles('trivy-*.sarif') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.6.2
        with:
          name: trivy-sarif-results
          path: trivy-*.sarif
          retention-days: 30

      - name: Upload SBOM artifacts
        if: always() && steps.projects.outputs.should_publish == 'true' && hashFiles('sbom-*.cyclonedx.json') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.6.2
        with:
          name: sbom-cyclonedx
          path: sbom-*.cyclonedx.json
          retention-days: 30

      - name: Upload provenance artifacts
        if: always() && steps.projects.outputs.should_publish == 'true' && hashFiles('provenance-*.json') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.6.2
        with:
          name: slsa-provenance
          path: provenance-*.json
          retention-days: 30

      - name: Normalize publish outputs
        id: publish_outputs
        env:
          APPLICATIONS_JSON: ${{ steps.record_state.outputs.applications_json }}
          ATTESTATION_REFERENCES_JSON: ${{ steps.record_state.outputs.attestation_references_json }}
        run: |
          applications_json="${APPLICATIONS_JSON:-{}}"
          attestation_references_json="${ATTESTATION_REFERENCES_JSON:-{}}"

          {
            echo "applications_json=${applications_json}"
            echo "attestation_references_json=${attestation_references_json}"
          } >> "$GITHUB_OUTPUT"

      - name: Publish image summary
        if: always()
        env:
          APPLICATIONS_JSON: ${{ steps.publish_outputs.outputs.applications_json }}
          SHOULD_PUBLISH: ${{ steps.projects.outputs.should_publish }}
          RESOLUTION_MODE: ${{ steps.projects.outputs.resolution_mode }}
          RESOLUTION_MESSAGE: ${{ steps.projects.outputs.resolution_message }}
          NX_BASE: ${{ steps.projects.outputs.nx_base }}
          NX_HEAD: ${{ steps.projects.outputs.nx_head }}
        run: |
          {
            echo "## Published Images"
            echo ""
            echo "- Project scope mode: \`${RESOLUTION_MODE}\`"
            echo "- Scope resolution: ${RESOLUTION_MESSAGE}"
            if [ -n "${NX_BASE}" ] && [ -n "${NX_HEAD}" ]; then
              echo "- Nx compare range: \`${NX_BASE}...${NX_HEAD}\`"
            else
              echo "- Nx compare range: unavailable"
            fi
            echo ""
            echo "\`\`\`json"
            echo "${APPLICATIONS_JSON}" | jq .
            echo "\`\`\`"
            echo ""
            echo "- Registry: \`ghcr.io/${{ env.IMAGE_ORG }}\`"
            echo "- Tag: \`${{ steps.deploy_context.outputs.image_tag }}\`"
            echo "- Signing: Cosign keyless"
            echo "- SBOM: CycloneDX"
            echo "- Provenance: SLSA"
            if [ "${SHOULD_PUBLISH}" != "true" ]; then
              echo ""
              echo "> Publish stage was intentionally skipped because no affected docker:build projects were detected."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Finalize Nx Cloud CI run
        if: always() && env.NX_CLOUD_ACCESS_TOKEN != ''
        run: pnpm exec nx fix-ci || true
