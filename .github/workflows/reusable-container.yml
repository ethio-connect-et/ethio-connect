name: Reusable Container Build Push

on:
  workflow_call:
    inputs:
      image_tag:
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: nrwl/nx-set-shas@v4
      - name: Set container env
        run: |
          echo "NX_DOCKER_REGISTRY=ghcr.io" >> "$GITHUB_ENV"
          echo "NX_DOCKER_REPOSITORY=${{ github.repository_owner }}" >> "$GITHUB_ENV"
          echo "NX_IMAGE_TAG=${{ inputs.image_tag }}" >> "$GITHUB_ENV"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build affected images
        run: pnpm nx affected -t container --parallel=3
      - name: Push affected images
        run: pnpm nx affected -t container-push --parallel=3
      - uses: actions/upload-artifact@v4
        with:
          name: image-metadata
          path: dist/containers/**/image.json
          if-no-files-found: error
