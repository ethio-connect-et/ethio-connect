name: Workflow Policy

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'

permissions:
  contents: read

concurrency:
  group: workflow-policy-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: actionlint + policy checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v4.2.2
        with:
          fetch-depth: 1

      - name: Run actionlint
        uses: rhysd/actionlint@03d0035246f3e81f36aed592ffb4bebf33a03106 # v1.7.7

      - name: Enforce full-SHA action pinning
        shell: bash
        run: |
          set -euo pipefail
          if rg -n "uses:\s*[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+@v?[0-9]+(\.[0-9]+)*" .github/workflows; then
            echo "::error::Found non-SHA-pinned third-party action reference(s)."
            exit 1
          fi
