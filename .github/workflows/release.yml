name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (for example v1.2.3 or v1.2.3-rc.1)'
        required: true
        type: string
      changelog:
        description: 'Override release notes'
        required: false
        type: string
      prerelease:
        description: 'Mark this GitHub release as a prerelease'
        required: false
        type: boolean
        default: false

permissions: {}

env:
  CI: true
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
  NODE_VERSION: '24.11.0'
  PNPM_VERSION: '10.20.0'

jobs:
  release_publish:
    name: Release · Publish
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      version: ${{ steps.context.outputs.version }}
      prerelease: ${{ steps.context.outputs.prerelease }}
      short_sha: ${{ steps.release-metadata.outputs.short_sha }}
      docker_version: ${{ steps.release-metadata.outputs.docker_version }}
    permissions:
      contents: write
      packages: write
    steps:
      - name: Resolve release context and validate version
        id: context
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ref="refs/heads/main"
            base_branch="main"
            version="${{ github.event.inputs.version }}"
            prerelease="${{ github.event.inputs.prerelease }}"
          else
            ref="${GITHUB_REF}"
            base_branch="main"
            version="${GITHUB_REF#refs/tags/}"
            prerelease=false
          fi

          if [[ ! "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Version must be semver-like, for example v1.2.3 or v1.2.3-rc.1"
            exit 1
          fi

          if [[ "$version" == *-* ]]; then
            prerelease=true
          fi

          {
            echo "ref=$ref"
            echo "base_branch=$base_branch"
            echo "version=$version"
            echo "prerelease=$prerelease"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          ref: ${{ steps.context.outputs.ref }}
          fetch-depth: 0
          filter: tree:0

      - name: Ensure release commit belongs to main
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "::error::Releases are only allowed from commits reachable from origin/main. Tagged commit: $GITHUB_SHA"
            exit 1
          fi

      - uses: pnpm/action-setup@c8f6b4d3c5a1c863fb154a22d4d35d7960ab353a
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@cdca7365b47f2e2d69d2f7eb4fdb67d719f0cc14
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: |
          pnpm fetch --frozen-lockfile
          pnpm install --frozen-lockfile --prefer-offline

      - name: Resolve release metadata
        id: release-metadata
        shell: bash
        run: |
          set -euo pipefail
          short_sha="$(git rev-parse --short=12 HEAD)"
          version="${{ steps.context.outputs.version }}"
          docker_version="${version#v}"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "docker_version=$docker_version" >> "$GITHUB_OUTPUT"

      - name: Authenticate with GitHub Container Registry
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Nx release versions for all groups
        shell: bash
        run: |
          set -euo pipefail
          docker_version="${{ steps.release-metadata.outputs.docker_version }}"

          for group in shared-libs central-hub customer-portal vendor-portal; do
            echo "Processing release group: $group with version $docker_version"
            pnpm nx release version "$docker_version" --groups "$group" --dockerVersion "$docker_version" --stage-changes=false --git-commit=false --git-tag=false
          done

      - name: Publish all release groups
        shell: bash
        run: |
          set -euo pipefail
          for group in shared-libs central-hub customer-portal vendor-portal; do
            echo "Publishing release group: $group"
            pnpm nx release publish --groups "$group" --yes
          done

      - name: Build release evidence attestation
        id: attestation
        shell: bash
        run: |
          set -euo pipefail
          source scripts/manifest-dispatch.sh
          version="${{ steps.context.outputs.version }}"
          docker_version="${{ steps.release-metadata.outputs.docker_version }}"
          short_sha="${{ steps.release-metadata.outputs.short_sha }}"
          apps_json='[]'
          while IFS= read -r project; do
            [[ -z "$project" ]] && continue
            app="${project#@ethio-connect/}"
            image_ref="${REGISTRY_PREFIX}/${app}:${docker_version}"
            digest="$(docker buildx imagetools inspect "$image_ref" --format '{{json .Manifest}}' | jq -r '.digest')"
            [[ "$digest" =~ $DIGEST_REGEX ]] || { echo "::error::Invalid digest for ${app}: ${digest}"; exit 1; }
            apps_json="$(jq -c --arg app "$app" --arg digest "$digest" '. + [{app:$app,digest:$digest}]' <<<"$apps_json")"
          done < <(resolve_apps_with_docker_target)

          jq -n \
            --arg version "$version" \
            --arg docker_version "$docker_version" \
            --arg release_sha "$GITHUB_SHA" \
            --arg short_sha "$short_sha" \
            --arg tag_ref "${GITHUB_REF}" \
            --arg generated_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg env "production" \
            --argjson apps "$apps_json" \
            '{
              version:$version,
              docker_version:$docker_version,
              release_sha:$release_sha,
              short_sha:$short_sha,
              tag_ref:$tag_ref,
              env:$env,
              generated_at:$generated_at,
              apps:$apps
            }' > promotion-attestation.json
          echo "path=promotion-attestation.json" >> "$GITHUB_OUTPUT"

      - name: Upload promotion attestation artifact
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808
        with:
          name: promotion-attestation
          path: ${{ steps.attestation.outputs.path }}

      - name: Generate release changelog from git history
        id: changelog
        shell: bash
        run: |
          set -euo pipefail

          override="${{ github.event.inputs.changelog }}"
          version="${{ steps.context.outputs.version }}"
          previous_tag="$(git tag --sort=-creatordate --list 'v*' | grep -vx "$version" | head -1 || true)"

          if [[ -n "$override" ]]; then
            {
              echo "body<<EOF"
              printf '%s\n' "$override"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -n "$previous_tag" ]]; then
            changes="$(git log --pretty=format:'- %s (%h)' "${previous_tag}..HEAD" -- apps libs .github/workflows)"
          else
            changes="$(git log --pretty=format:'- %s (%h)' -n 50 -- apps libs .github/workflows)"
          fi

          {
            echo "body<<EOF"
            echo "## Release ${version}"
            echo ""
            if [[ -n "$previous_tag" ]]; then
              echo "Previous tag: \`${previous_tag}\`"
              echo ""
            fi
            echo "### Changes"
            if [[ -n "$changes" ]]; then
              printf '%s\n' "$changes"
            else
              echo "- No workspace changes detected in the release range."
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631
        with:
          tag_name: ${{ steps.context.outputs.version }}
          target_commitish: ${{ github.sha }}
          name: Release ${{ steps.context.outputs.version }}
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: ${{ steps.context.outputs.prerelease == 'true' }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  promote_to_manifest:
    name: Promote to Manifest Repo
    needs: release_publish
    runs-on: ubuntu-latest
    if: ${{ always() && needs.release_publish.result == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          fetch-depth: 1

      - name: Validate workflow contract markers
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ripgrep
          rg -n 'sha256:[0-9a-f]{64}' scripts/manifest-dispatch.sh

      - name: Authenticate with GitHub Container Registry
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      - name: Download promotion attestation artifact
        uses: actions/download-artifact@95815c38cf65f14a6c5cae202f3b0f9b651f1f59
        with:
          name: promotion-attestation

      - name: Resolve, verify and dispatch manifest promotions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.release_publish.outputs.version }}
          DOCKER_VERSION: ${{ needs.release_publish.outputs.docker_version }}
          RELEASE_SHA: ${{ github.sha }}
          SHORT_SHA: ${{ needs.release_publish.outputs.short_sha }}
        shell: bash
        run: |
          set -euo pipefail
          source scripts/manifest-dispatch.sh

          jq -e --arg version "$VERSION" --arg docker_version "$DOCKER_VERSION" --arg sha "$RELEASE_SHA" --arg short_sha "$SHORT_SHA" '
            .version == $version and
            .docker_version == $docker_version and
            .release_sha == $sha and
            .short_sha == $short_sha and
            .env == "production" and
            (.apps | type == "array" and length > 0 and all(.[]; has("app") and has("digest") and (.digest | test("^sha256:[0-9a-f]{64}$"))))
          ' promotion-attestation.json >/dev/null

          while IFS= read -r item; do
            app="$(jq -r '.app' <<< "$item")"
            digest="$(jq -r '.digest' <<< "$item")"
            verify_release_digest "$app" "$digest" "$DOCKER_VERSION" "$RELEASE_SHA" "$VERSION"
            payload="$(build_dispatch_payload "$app" "$digest" "production")"
            gh api repos/ethio-connect-et/ethio-connect-manifest/dispatches \
              -H "Accept: application/vnd.github+json" \
              --method POST \
              --input - <<<"$payload"
          done < <(jq -c '.apps[]' promotion-attestation.json)
