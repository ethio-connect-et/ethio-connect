name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (for example v1.2.3 or v1.2.3-rc.1)'
        required: true
        type: string
      changelog:
        description: 'Override release notes'
        required: false
        type: string
      prerelease:
        description: 'Mark this GitHub release as a prerelease'
        required: false
        type: boolean
        default: false

permissions: {}

env:
  CI: true
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
  NODE_VERSION: '24.11.0'
  PNPM_VERSION: '10.20.0'

jobs:
  release_publish:
    name: Release Â· Publish
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      version: ${{ steps.context.outputs.version }}
      prerelease: ${{ steps.context.outputs.prerelease }}
    permissions:
      contents: write
      packages: write
    steps:
      - name: Resolve release context and validate version
        id: context
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ref="refs/heads/main"
            base_branch="main"
            version="${{ github.event.inputs.version }}"
            prerelease="${{ github.event.inputs.prerelease }}"
          else
            ref="${GITHUB_REF}"
            base_branch="main"
            version="${GITHUB_REF#refs/tags/}"
            prerelease=false
          fi

          if [[ ! "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Version must be semver-like, for example v1.2.3 or v1.2.3-rc.1"
            exit 1
          fi

          if [[ "$version" == *-* ]]; then
            prerelease=true
          fi

          {
            echo "ref=$ref"
            echo "base_branch=$base_branch"
            echo "version=$version"
            echo "prerelease=$prerelease"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.context.outputs.ref }}
          fetch-depth: 0
          filter: tree:0

      - name: Ensure release commit belongs to main
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "::error::Releases are only allowed from commits reachable from origin/main. Tagged commit: $GITHUB_SHA"
            exit 1
          fi

      - uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: |
          pnpm fetch --frozen-lockfile
          pnpm install --frozen-lockfile --prefer-offline

      - name: Resolve release metadata
        id: release-metadata
        shell: bash
        run: |
          set -euo pipefail
          short_sha="$(git rev-parse --short=12 HEAD)"
          version="${{ steps.context.outputs.version }}"
          docker_version="${version#v}"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "docker_version=$docker_version" >> "$GITHUB_OUTPUT"

      - name: Authenticate with GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Nx release versions for all groups
        shell: bash
        run: |
          set -euo pipefail
          docker_version="${{ steps.release-metadata.outputs.docker_version }}"

          for group in shared-libs central-hub customer-portal vendor-portal; do
            echo "Processing release group: $group with version $docker_version"
            pnpm nx release version "$docker_version" --groups "$group" --dockerVersion "$docker_version" --stage-changes=false --git-commit=false --git-tag=false
          done

      - name: Publish all release groups
        shell: bash
        run: |
          set -euo pipefail
          for group in shared-libs central-hub customer-portal vendor-portal; do
            echo "Publishing release group: $group"
            pnpm nx release publish --groups "$group" --yes
          done

      - name: Generate release changelog from git history
        id: changelog
        shell: bash
        run: |
          set -euo pipefail

          override="${{ github.event.inputs.changelog }}"
          version="${{ steps.context.outputs.version }}"
          previous_tag="$(git tag --sort=-creatordate --list 'v*' | grep -vx "$version" | head -1 || true)"

          if [[ -n "$override" ]]; then
            {
              echo "body<<EOF"
              printf '%s\n' "$override"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -n "$previous_tag" ]]; then
            changes="$(git log --pretty=format:'- %s (%h)' "${previous_tag}..HEAD" -- apps libs .github/workflows)"
          else
            changes="$(git log --pretty=format:'- %s (%h)' -n 50 -- apps libs .github/workflows)"
          fi

          {
            echo "body<<EOF"
            echo "## Release ${version}"
            echo ""
            if [[ -n "$previous_tag" ]]; then
              echo "Previous tag: \`${previous_tag}\`"
              echo ""
            fi
            echo "### Changes"
            if [[ -n "$changes" ]]; then
              printf '%s\n' "$changes"
            else
              echo "- No workspace changes detected in the release range."
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.context.outputs.version }}
          target_commitish: ${{ github.sha }}
          name: Release ${{ steps.context.outputs.version }}
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: ${{ steps.context.outputs.prerelease == 'true' }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  promote_to_manifest:
    name: Promote to Manifest Repo
    needs: release_publish
    runs-on: ubuntu-latest
    if: ${{ always() && needs.release_publish.result == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Gather image digests
        id: digests
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "apps=customer-portal,central-hub,vendor-portal"
            echo "customer-portal_digest=sha256:EXAMPLE1"
            echo "central-hub_digest=sha256:EXAMPLE2"
            echo "vendor-portal_digest=sha256:EXAMPLE3"
          } >> "$GITHUB_OUTPUT"

      - name: Dispatch promotion event(s) to manifest repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPS: ${{ steps.digests.outputs.apps }}
          CUSTOMER_PORTAL_DIGEST: ${{ steps.digests.outputs.customer-portal_digest }}
          CENTRAL_HUB_DIGEST: ${{ steps.digests.outputs.central-hub_digest }}
          VENDOR_PORTAL_DIGEST: ${{ steps.digests.outputs.vendor-portal_digest }}
        run: |
          set -euo pipefail
          IFS=',' read -ra ADDR <<< "$APPS"
          for app in "${ADDR[@]}"; do
            case "$app" in
              customer-portal) digest="$CUSTOMER_PORTAL_DIGEST" ;;
              central-hub)     digest="$CENTRAL_HUB_DIGEST" ;;
              vendor-portal)   digest="$VENDOR_PORTAL_DIGEST" ;;
              *) echo "::error::Unknown app: $app"; exit 1 ;;
            esac
            env_name="production"
            gh api repos/ethio-connect-et/ethio-connect-manifest/dispatches \
              -H "Accept: application/vnd.github+json" \
              -f event_type=promote-image \
              -f "client_payload={\"app\":\"$app\",\"digest\":\"$digest\",\"env\":\"$env_name\"}"
          done

      - name: Emit promotion attestation artifact
        shell: bash
        run: |
          set -euo pipefail
          cat <<EOF > promotion-attestation.json
          {
            "version": "${{ needs.release_publish.outputs.version }}",
            "apps": [
              {"name": "customer-portal", "digest": "${{ steps.digests.outputs.customer-portal_digest }}"},
              {"name": "central-hub", "digest": "${{ steps.digests.outputs.central-hub_digest }}"},
              {"name": "vendor-portal", "digest": "${{ steps.digests.outputs.vendor-portal_digest }}"}
            ],
            "env": "production"
          }
          EOF

      - name: Upload attestation artifact
        uses: actions/upload-artifact@v4
        with:
          name: promotion-attestation
          path: promotion-attestation.json
