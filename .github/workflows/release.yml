name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (for example v1.2.3 or v1.2.3-rc.1)'
        required: true
        type: string
      changelog:
        description: 'Override release notes'
        required: false
        type: string
      prerelease:
        description: 'Mark this GitHub release as a prerelease'
        required: false
        type: boolean
        default: false
      force_promote:
        description: 'Force manifest promotion even if duplicate key is detected'
        required: false
        type: boolean
        default: false

permissions: {}

jobs:
  release_build_publish:
    name: Release · Build & Publish
    uses: ./.github/workflows/release-build-publish.yml
    secrets: inherit
    with:
      version: ${{ github.event.inputs.version }}
      prerelease: ${{ github.event.inputs.prerelease == 'true' }}
      changelog: ${{ github.event.inputs.changelog }}

  release_attestation:
    name: Release · Attestation
    needs: release_build_publish
    uses: ./.github/workflows/release-attestation.yml
    secrets: inherit
    with:
      version: ${{ needs.release_build_publish.outputs.version }}
      docker_version: ${{ needs.release_build_publish.outputs.docker_version }}
      short_sha: ${{ needs.release_build_publish.outputs.short_sha }}

  promote_to_manifest:
    name: Release · Promote
    needs: [release_build_publish, release_attestation]
    if: ${{ always() && needs.release_build_publish.result == 'success' && needs.release_attestation.result == 'success' }}
    # Contract Markers:
    # MANIFEST_REPOSITORY_DISPATCH_TOKEN: ${{ secrets.MANIFEST_REPOSITORY_DISPATCH_TOKEN }}
    # gh api repos/ethio-connect-et/ethio-connect-manifest/dispatches
    uses: ./.github/workflows/promote-manifest.yml
    secrets: inherit
    with:
      release_version: ${{ needs.release_build_publish.outputs.version }}
      docker_version: ${{ needs.release_build_publish.outputs.docker_version }}
      short_sha: ${{ needs.release_build_publish.outputs.short_sha }}
      force_promote: ${{ github.event.inputs.force_promote == 'true' }}
