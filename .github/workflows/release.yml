name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version specifier for Nx (e.g. 1.2.3, patch, minor, prerelease)"
        required: true
        type: string
      source_sha:
        description: "The full git SHA to release from"
        required: true
        type: string
      release_group:
        description: "Nx release group to execute"
        required: false
        type: string
        default: "default"
      run_docker_gate:
        description: "Run docker:run gate before publish"
        required: false
        type: boolean
        default: false
      prerelease:
        description: "Mark this as a pre-release for GitHub release"
        required: false
        type: boolean
        default: false

permissions: {}

concurrency:
  group: release-${{ inputs.version }}-${{ inputs.release_group }}
  cancel-in-progress: false

env:
  IMAGE_REGISTRY: ghcr.io
  IMAGE_ORG: ethio-connect-et
  ORG_LC: ethio-connect-et

jobs:
  nx_release_prepare:
    name: Nx Release Version + Changelog
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    outputs:
      resolved_version: ${{ steps.resolve-version.outputs.version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.3
        with:
          ref: ${{ inputs.source_sha }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.1.0
        with:
          version: "10.20.0"
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v4.4.0
        with:
          node-version: "24.11.0"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Nx release version
        run: pnpm exec nx release version "${{ inputs.version }}" --groups="${{ inputs.release_group }}" --yes

      - name: Resolve release version from tag
        id: resolve-version
        run: |
          VERSION="$(git describe --tags --abbrev=0)"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved release version: ${VERSION}"

      - name: Nx release changelog
        run: pnpm exec nx release changelog "${{ steps.resolve-version.outputs.version }}" --groups="${{ inputs.release_group }}" --yes

      - name: Upload release metadata
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.6.2
        with:
          name: nx-release-metadata-${{ steps.resolve-version.outputs.version }}
          path: |
            CHANGELOG.md
            **/CHANGELOG.md
            .nx/workspace-data/**
          if-no-files-found: ignore
          retention-days: 365

  docker_release_artifacts:
    name: Docker Release Artifacts via Nx Targets
    needs: [nx_release_prepare]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.3
        with:
          ref: ${{ inputs.source_sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.1.0
        with:
          version: "10.20.0"
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v4.4.0
        with:
          node-version: "24.11.0"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve release docker projects
        id: release_projects
        run: |
          projects_json="$(pnpm exec nx show projects --withTarget docker:build --json)"
          if [ "$(printf '%s' "${projects_json}" | jq 'length')" -eq 0 ]; then
            echo "::error::No projects with docker:build targets were found for release publish." >&2
            exit 1
          fi

          projects_csv="$(printf '%s' "${projects_json}" | jq -r 'join(",")')"
          representative_project="$(printf '%s' "${projects_json}" | jq -r '.[0]')"
          representative_image="${IMAGE_REGISTRY}/${ORG_LC}/${representative_project##*/}:${{ needs.nx_release_prepare.outputs.resolved_version }}"

          {
            echo "projects_json=${projects_json}"
            echo "projects_csv=${projects_csv}"
            echo "representative_image=${representative_image}"
          } >> "$GITHUB_OUTPUT"

      - name: Preflight image reference naming
        env:
          EXPECTED_ORG: ethio-connect-et
        run: |
          representative_image="${{ steps.release_projects.outputs.representative_image }}"
          echo "Representative release image ref: ${representative_image}"

          if [ "${IMAGE_ORG}" != "${EXPECTED_ORG}" ] || [ "${ORG_LC}" != "${EXPECTED_ORG}" ]; then
            echo "::error::IMAGE_ORG/ORG_LC must both equal ${EXPECTED_ORG}. Got IMAGE_ORG=${IMAGE_ORG}, ORG_LC=${ORG_LC}." >&2
            exit 1
          fi

          if ! [[ "${representative_image}" =~ ^ghcr\.io/[a-z0-9]+([-.][a-z0-9]+)*/[a-z0-9]+([_.-][a-z0-9]+)*:[A-Za-z0-9._-]+$ ]]; then
            echo "::error::Malformed representative image ref: ${representative_image}" >&2
            exit 1
          fi

          case "${representative_image}" in
            "${IMAGE_REGISTRY}/${IMAGE_ORG}/"*) ;;
            *)
              echo "::error::Representative image ref does not match ${IMAGE_REGISTRY}/${IMAGE_ORG}/<project>:<tag> format." >&2
              exit 1
              ;;
          esac

      - name: OIDC login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker artifacts via Nx
        run: pnpm exec nx run-many -t docker:build --projects="${{ steps.release_projects.outputs.projects_csv }}"

      - name: Docker runtime gate via Nx
        if: ${{ inputs.run_docker_gate }}
        run: pnpm exec nx run-many -t docker:run --projects="${{ steps.release_projects.outputs.projects_csv }}"

      - name: Publish release artifacts via Nx
        env:
          REGISTRY: ${{ env.IMAGE_REGISTRY }}
          ORG_LC: ${{ env.ORG_LC }}
          IMAGE_TAG: ${{ needs.nx_release_prepare.outputs.resolved_version }}
        run: pnpm exec nx run-many -t nx-release-publish --projects="${{ steps.release_projects.outputs.projects_csv }}"

      - name: Upload docker release manifests
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.6.2
        with:
          name: docker-release-artifacts-${{ needs.nx_release_prepare.outputs.resolved_version }}
          path: |
            dist/**
            coverage/**
          if-no-files-found: ignore
          retention-days: 30

  publish_github_release:
    name: Publish GitHub Release
    needs: [nx_release_prepare, docker_release_artifacts]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.3
        with:
          ref: ${{ inputs.source_sha }}

      - name: Download Nx release metadata
        uses: actions/download-artifact@cbed621e49e4c01b044d60f6c80ea4ed6328b281 # v4.2.1
        continue-on-error: true
        with:
          name: nx-release-metadata-${{ needs.nx_release_prepare.outputs.resolved_version }}
          path: release-assets/

      - name: Create GitHub release body
        run: |
          cat > release-body.md <<'EOF'
          ## Release ${{ needs.nx_release_prepare.outputs.resolved_version }}

          Release lifecycle (versioning + changelog + publish) executed through Nx release groups.

          ### Source
          - Source SHA: `${{ inputs.source_sha }}`
          - Nx release group: `${{ inputs.release_group }}`

          ### Artifacts
          - Canonical container org variable: `IMAGE_ORG` (`ethio-connect-et`), mirrored to `ORG_LC` and consumed by docker build/publish/signing ref composition in `.github/workflows/ci-image-publish-attest.yml` and release preflight checks in `.github/workflows/release.yml`.
          - Docker artifacts built via Nx targets (`docker:build` and optional `docker:run`)
          - Publish performed by Nx target `nx-release-publish`
          - Changelog and release metadata generated by `nx release changelog`
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.3.2
        with:
          tag_name: ${{ needs.nx_release_prepare.outputs.resolved_version }}
          name: ${{ needs.nx_release_prepare.outputs.resolved_version }}
          body_path: release-body.md
          target_commitish: ${{ inputs.source_sha }}
          prerelease: ${{ inputs.prerelease }}
          files: |
            release-assets/**/*.md
            release-assets/**/*.json
          token: ${{ secrets.GITHUB_TOKEN }}
