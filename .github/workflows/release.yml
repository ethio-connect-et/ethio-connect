name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (for example v1.2.3 or v1.2.3-rc.1)'
        required: true
        type: string
      changelog:
        description: 'Override release notes'
        required: false
        type: string
      prerelease:
        description: 'Mark this GitHub release as a prerelease'
        required: false
        type: boolean
        default: false
      force_promote:
        description: 'Force manifest promotion even if duplicate key is detected'
        required: false
        type: boolean
        default: false
      scan_gate_override:
        description: 'Override vulnerability scan gate (requires audit reason)'
        required: false
        type: boolean
        default: false
      scan_gate_override_reason:
        description: 'Auditable justification for scan gate override'
        required: false
        type: string

permissions:
  contents: write
  packages: write
  actions: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release_policy:
    name: Release · Policy Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v4.2.2
      - uses: ./.github/actions/setup-nx-node
      - name: Validate release scope contract
        shell: bash
        run: pnpm run validate:release-scope
      - name: Enforce protected refs and release trigger policy
        shell: bash
        run: |
          set -euo pipefail
          echo "event=${GITHUB_EVENT_NAME} ref=${GITHUB_REF} protected=${GITHUB_REF_PROTECTED:-false}"
          if [[ "${GITHUB_REF_PROTECTED:-false}" != "true" ]]; then
            echo "::error::Release workflow requires a protected branch/tag ref."
            exit 1
          fi

          case "${GITHUB_EVENT_NAME}" in
            workflow_dispatch)
              if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
                echo "::error::Manual releases are only allowed from protected main (refs/heads/main)."
                exit 1
              fi
              ;;
            push)
              if [[ ! "${GITHUB_REF}" =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
                echo "::error::Tag push releases require SemVer-like v* tags."
                exit 1
              fi
              ;;
            *)
              echo "::error::Unsupported release trigger ${GITHUB_EVENT_NAME}."
              exit 1
              ;;
          esac

  release_build_publish:
    name: Release · Build & Publish
    needs: release_policy
    uses: ./.github/workflows/release-build-publish.yml
    secrets: inherit
    with:
      version: ${{ github.event.inputs.version }}
      prerelease: ${{ github.event.inputs.prerelease == 'true' }}
      changelog: ${{ github.event.inputs.changelog }}
      scan_gate_override: ${{ github.event.inputs.scan_gate_override == 'true' }}
      scan_gate_override_reason: ${{ github.event.inputs.scan_gate_override_reason }}

  release_attestation:
    name: Release · Attestation
    needs: release_build_publish
    uses: ./.github/workflows/release-attestation.yml
    secrets: inherit
    with:
      version: ${{ needs.release_build_publish.outputs.version }}
      docker_version: ${{ needs.release_build_publish.outputs.docker_version }}
      short_sha: ${{ needs.release_build_publish.outputs.short_sha }}

  promote_to_manifest:
    name: Release · Promote
    needs: [release_build_publish, release_attestation]
    if: ${{ always() && needs.release_build_publish.result == 'success' && needs.release_attestation.result == 'success' }}
    # Contract Markers:
    # MANIFEST_REPOSITORY_DISPATCH_TOKEN: ${{ secrets.MANIFEST_REPOSITORY_DISPATCH_TOKEN }}
    # gh api repos/ethio-connect-et/ethio-connect-manifest/dispatches
    uses: ./.github/workflows/promote-manifest.yml
    secrets: inherit
    with:
      release_version: ${{ needs.release_build_publish.outputs.version }}
      docker_version: ${{ needs.release_build_publish.outputs.docker_version }}
      short_sha: ${{ needs.release_build_publish.outputs.short_sha }}
      force_promote: ${{ github.event.inputs.force_promote == 'true' }}
      attestation_artifact_name: ${{ needs.release_attestation.outputs.attestation_artifact_name }}
