name: CI Release Dispatch

on:
  workflow_call:
    inputs:
      source_sha:
        description: 'Git SHA that produced the published images'
        required: true
        type: string
      source_ref:
        description: 'Protected branch ref that produced the release payload'
        required: true
        type: string
      target_environment:
        description: 'Downstream environment intake target'
        required: true
        type: string
      image_tag:
        description: 'Published image tag'
        required: true
        type: string
      release_version:
        description: 'Release version identifier'
        required: true
        type: string
      release_schema_version:
        description: 'Release dispatch payload schema version'
        required: false
        type: string
        default: '1.0.0'
      applications_json:
        description: 'Map of application name to immutable image digest reference'
        required: true
        type: string
      attestation_references_json:
        description: 'Map of application name to attestation subject reference'
        required: true
        type: string
      environments_repository:
        description: 'owner/repo for the downstream environments repository'
        required: false
        type: string
        default: 'ethio-connect-sc/ethio-connect-environments'
permissions:
  contents: read

concurrency:
  group: ci-release-dispatch-${{ github.workflow_ref }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'push' }}

jobs:
  validate_release_dispatch:
    name: Validate Staging Dispatch Payload
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Validate dispatch contract
        env:
          SOURCE_REF: ${{ inputs.source_ref }}
          TARGET_ENVIRONMENT: ${{ inputs.target_environment }}
          APPLICATIONS_JSON: ${{ inputs.applications_json }}
          ATTESTATION_REFERENCES_JSON: ${{ inputs.attestation_references_json }}
          RELEASE_SCHEMA_VERSION: ${{ inputs.release_schema_version }}
        run: |
          if [ "${SOURCE_REF}" != "refs/heads/staging" ]; then
            echo "::error::Only refs/heads/staging may dispatch application release intake." >&2
            exit 1
          fi

          if [ "${TARGET_ENVIRONMENT}" != "staging" ]; then
            echo "::error::Downstream intake must target the staging environment." >&2
            exit 1
          fi

          app_count="$(printf '%s' "${APPLICATIONS_JSON}" | jq 'length')"
          attestation_count="$(printf '%s' "${ATTESTATION_REFERENCES_JSON}" | jq 'length')"

          if [ "${app_count}" -eq 0 ] || [ "${attestation_count}" -eq 0 ]; then
            echo "::error::Dispatch payload must include application and attestation entries." >&2
            exit 1
          fi

          cat > dispatch-payload.json <<PAYLOAD
          {
            "schema_version": "${RELEASE_SCHEMA_VERSION}",
            "source_repository": "${{ github.repository }}",
            "source_workflow": ".github/workflows/ci-image-publish-attest.yml",
            "source_sha": "${{ inputs.source_sha }}",
            "source_ref": "${{ inputs.source_ref }}",
            "target_environment": "${{ inputs.target_environment }}",
            "image_tag": "${{ inputs.image_tag }}",
            "release_version": "${{ inputs.release_version }}",
            "applications": ${APPLICATIONS_JSON},
            "attestation_references": ${ATTESTATION_REFERENCES_JSON}
          }
          PAYLOAD

          node scripts/ci/validate-json-schema.mjs \
            contracts/release-dispatch/v1/app-release-published.schema.json \
            dispatch-payload.json

      - name: Summarize dispatch payload
        run: |
          {
            echo "## Staging Release Dispatch"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Schema Version | \`${{ inputs.release_schema_version }}\` |"
            echo "| Source SHA | \`${{ inputs.source_sha }}\` |"
            echo "| Source Ref | \`${{ inputs.source_ref }}\` |"
            echo "| Target Environment | \`${{ inputs.target_environment }}\` |"
            echo "| Image Tag | \`${{ inputs.image_tag }}\` |"
            echo "| Release Version | \`${{ inputs.release_version }}\` |"
            echo ""
            echo "Environments intake must validate that \`schema_version\` matches \`${{ inputs.release_schema_version }}\` before processing this payload."
          } >> "$GITHUB_STEP_SUMMARY"

  dispatch_cross_repo_event:
    name: Dispatch Cross-Repo Release Event
    needs: [validate_release_dispatch]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Validate environments dispatch token
        env:
          ENVIRONMENTS_REPO_TOKEN: ${{ secrets.ENVIRONMENTS_REPO_TOKEN }}
        run: |
          if [ -z "${ENVIRONMENTS_REPO_TOKEN}" ]; then
            echo "::error::Missing ENVIRONMENTS_REPO_TOKEN secret for cross-repo dispatch." >&2
            exit 1
          fi

      - name: Dispatch app-release-published event
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v7.0.1
        env:
          ENVIRONMENTS_REPOSITORY: ${{ inputs.environments_repository }}
          RELEASE_SCHEMA_VERSION: ${{ inputs.release_schema_version }}
          SOURCE_SHA: ${{ inputs.source_sha }}
          SOURCE_REF: ${{ inputs.source_ref }}
          TARGET_ENVIRONMENT: ${{ inputs.target_environment }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          RELEASE_VERSION: ${{ inputs.release_version }}
          APPLICATIONS_JSON: ${{ inputs.applications_json }}
          ATTESTATION_REFERENCES_JSON: ${{ inputs.attestation_references_json }}
        with:
          github-token: ${{ secrets.ENVIRONMENTS_REPO_TOKEN }}
          script: |
            const [owner, repo] = process.env.ENVIRONMENTS_REPOSITORY.split('/');
            const applications = JSON.parse(process.env.APPLICATIONS_JSON);
            const attestationReferences = JSON.parse(process.env.ATTESTATION_REFERENCES_JSON);

            await github.rest.repos.createDispatchEvent({
              owner,
              repo,
              event_type: 'app-release-published',
              client_payload: {
                schema_version: process.env.RELEASE_SCHEMA_VERSION,
                source_repository: `${context.repo.owner}/${context.repo.repo}`,
                source_workflow: '.github/workflows/ci-image-publish-attest.yml',
                source_sha: process.env.SOURCE_SHA,
                source_ref: process.env.SOURCE_REF,
                target_environment: process.env.TARGET_ENVIRONMENT,
                image_tag: process.env.IMAGE_TAG,
                release_version: process.env.RELEASE_VERSION,
                applications,
                attestation_references: attestationReferences,
              },
            });

            core.info(`Dispatched app-release-published to ${owner}/${repo}`);
