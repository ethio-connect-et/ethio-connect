name: Release Drafter

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

jobs:
  release_draft:
    name: Release · Draft Notes
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate draft release notes
        uses: release-drafter/release-drafter@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
