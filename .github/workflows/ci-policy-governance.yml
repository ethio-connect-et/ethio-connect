name: CI Policy and Governance

on:
  workflow_call:
    inputs:
      node_version:
        required: false
        type: string
        default: '24.11.0'
      pnpm_version:
        required: false
        type: string
        default: '10.20.0'
      event_name:
        required: false
        type: string
        default: ''
      base_ref:
        required: false
        type: string
        default: ''
      head_ref:
        required: false
        type: string
        default: ''

permissions:
  actions: read
  contents: read
  pull-requests: read

concurrency:
  group: ci-governance-${{ github.workflow_ref }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'push' }}

env:
  CI: 'true'
  NODE_VERSION: ${{ inputs.node_version }}
  PNPM_VERSION: ${{ inputs.pnpm_version }}

jobs:
  governance_policy_checks:
    name: Governance Branch and Workflow Policy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.3
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.1.0
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install actionlint
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ACTIONLINT_VERSION="1.7.7"
          mkdir -p "$RUNNER_TEMP/bin"
          gh release download \
            --repo rhysd/actionlint \
            --pattern "actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            --output /tmp/actionlint.tar.gz \
            "v${ACTIONLINT_VERSION}"
          tar -xzf /tmp/actionlint.tar.gz -C "$RUNNER_TEMP/bin" actionlint
          chmod +x "$RUNNER_TEMP/bin/actionlint"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/bin/actionlint" --version

      - name: Lint GitHub Actions workflow files
        run: actionlint -color .github/workflows/*.yml

      - name: Enforce immutable action refs
        run: |
          bad_refs=$(rg --line-number --no-heading \
            '^\s*uses:\s+[^#\s]+@[A-Za-z0-9._/-]+' \
            .github/workflows/*.yml \
            | rg -v '@([a-f0-9]{40})($|\s+#)|@\./|^\s*$' || true)
          if [ -n "$bad_refs" ]; then
            echo "::error::Non-immutable action refs detected:" >&2
            echo "$bad_refs" >&2
            exit 1
          fi

      - name: Debug - List scripts
        run: |
          git branch
          git log -1 --oneline
          ls -R scripts
      - name: Enforce branch literal policy
        run: pnpm run ci:check-branch-policy

      - name: Enforce pull request branch ladder
        if: inputs.event_name == 'pull_request'
        env:
          BASE_REF: ${{ inputs.base_ref }}
          HEAD_REF: ${{ inputs.head_ref }}
        run: |
          base="${BASE_REF}"
          head="${HEAD_REF}"

          case "$base" in
            development)
              case "$head" in
                feat/*|fix/*|codex/*|chore/*|refactor/*|hotfix/*|perf/*|docs/*|ci/*|build/*|temp/*|dependabot/*|renovate/*|ops/development/*)
                  exit 0
                  ;;
              esac
              ;;
            testing)
              case "$head" in
                development|ops/testing/*)
                  exit 0
                  ;;
              esac
              ;;
            staging)
              case "$head" in
                testing|ops/staging/*)
                  exit 0
                  ;;
              esac
              ;;
            main)
              case "$head" in
                staging|ops/main/*)
                  exit 0
                  ;;
              esac
              ;;
          esac

          echo "::error::Unsupported pull request path: ${head} -> ${base}" >&2
          echo "Allowed paths: temporary branches -> development -> testing -> staging -> main" >&2
          exit 1
