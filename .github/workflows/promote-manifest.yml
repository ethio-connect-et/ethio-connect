name: Promote Manifest

on:
  workflow_call:
    inputs:
      release_version:
        required: true
        type: string
      docker_version:
        required: true
        type: string
      short_sha:
        required: true
        type: string
      force_promote:
        required: false
        type: boolean
        default: false

env:
  CI: true

jobs:
  promote:
    runs-on: self-host-runner
    timeout-minutes: 15
    permissions:
      contents: read
      packages: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 1

      - name: Validate workflow contract markers
        shell: bash
        run: |
          set -euo pipefail
          grep -En 'sha256:[0-9a-f]{64}' scripts/manifest-dispatch.sh || true

      - name: Authenticate with GitHub Container Registry
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.8.1

      - name: Download promotion attestation artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131
        with:
          name: promotion-attestation

      - name: Resolve, verify and dispatch manifest promotions
        env:
          GH_TOKEN: ${{ secrets.MANIFEST_REPOSITORY_DISPATCH_TOKEN }}
          MANIFEST_REPOSITORY_DISPATCH_TOKEN: ${{ secrets.MANIFEST_REPOSITORY_DISPATCH_TOKEN }}
          release_version: ${{ inputs.release_version }}
          docker_version: ${{ inputs.docker_version }}
          release_sha: ${{ github.sha }}
          short_sha: ${{ inputs.short_sha }}
          force_promote: ${{ inputs.force_promote || 'false' }}
        shell: bash
        run: |
          set -euo pipefail
          source scripts/manifest-dispatch.sh

          promoted_count=0
          skipped_count=0
          decisions='[]'

          jq -e --arg version "$release_version" --arg docker_version "$docker_version" --arg sha "$release_sha" --arg short_sha "$short_sha" '
            .version == $version and
            .docker_version == $docker_version and
            .release_sha == $sha and
            .short_sha == $short_sha and
            .env == "production" and
            (.apps | type == "array" and length > 0 and all(.[]; has("app") and has("digest") and (.digest | test("^sha256:[0-9a-f]{64}$"))))
          ' promotion-attestation.json >/dev/null

          while IFS= read -r item; do
            app="$(jq -r '.app' <<< "$item")"
            digest="$(jq -r '.digest' <<< "$item")"
            verify_release_digest "$app" "$digest" "$docker_version" "$release_sha" "$release_version"
            promotion_key="$(build_promotion_key "$app" "$digest" "production")"

            if [[ "${force_promote}" != "true" ]] && is_promotion_already_processed "$promotion_key"; then
              echo "Skipping dispatch for app=${app} digest=${digest} env=production promotion_key=${promotion_key} (already processed)."
              decisions="$(jq -c --arg app "$app" --arg digest "$digest" --arg key "$promotion_key" '. + [{app:$app,digest:$digest,promotion_key:$key,decision:"skipped",reason:"already processed"}]' <<<"$decisions")"
              skipped_count=$((skipped_count + 1))
              continue
            fi

            if [[ "${force_promote}" == "true" ]]; then
              echo "force_promote=true: dispatching app=${app} digest=${digest} env=production promotion_key=${promotion_key}."
            fi

            signed_payload="$(jq -nc \
              --arg app "$app" \
              --arg digest "$digest" \
              --arg source_repo "$GITHUB_REPOSITORY" \
              --arg source_ref "$GITHUB_REF" \
              --arg source_commit "$GITHUB_SHA" \
              --arg release_id "$GITHUB_RUN_ID" \
              --arg release_created_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              '{app:$app,digest:$digest,source_repo:$source_repo,source_ref:$source_ref,source_commit:$source_commit,release_id:$release_id,release_created_at:$release_created_at}' | jq -cS .)"
            printf '%s' "$signed_payload" > signed-payload.json
            cosign sign-blob --yes --output-signature signed-payload.sig --output-certificate signed-payload.crt signed-payload.json >/dev/null
            cosign verify-blob --certificate signed-payload.crt --signature signed-payload.sig --certificate-identity-regexp '.*' --certificate-oidc-issuer-regexp '.*' signed-payload.json >/dev/null

            signed_metadata="$(jq -nc \
              --arg signature_algorithm "ecdsa-p256-sha256" \
              --arg key_id "sigstore:github-actions-keyless" \
              --arg signature "$(base64 -w0 signed-payload.sig)" \
              --arg canonical_payload "$signed_payload" \
              --arg cert_leaf "$(base64 -w0 signed-payload.crt)" \
              '{signature_algorithm:$signature_algorithm,key_id:$key_id,cert_chain:[$cert_leaf],signature:$signature,canonical_payload:$canonical_payload}')"

            payload="$(build_dispatch_payload "$app" "$digest" "production" "$GITHUB_REPOSITORY" "$GITHUB_REF" "$GITHUB_SHA" "$GITHUB_RUN_ID" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "$signed_metadata" "$signed_payload" "$release_version")"
            gh api repos/ethio-connect-et/ethio-connect-manifest/dispatches \
              -H "Accept: application/vnd.github+json" \
              --method POST \
              --input - <<<"$payload"
            decisions="$(jq -c --arg app "$app" --arg digest "$digest" --arg key "$promotion_key" '. + [{app:$app,digest:$digest,promotion_key:$key,decision:"dispatched"}]' <<<"$decisions")"
            promoted_count=$((promoted_count + 1))
          done < <(jq -c '.apps[]' promotion-attestation.json)

          {
            echo "## Promotion Idempotency Summary"
            echo ""
            echo "- force_promote: \`${force_promote}\`"
            echo "- dispatched: ${promoted_count}"
            echo "- skipped: ${skipped_count}"
            echo ""
            echo "| app | digest | promotion_key | decision | reason |"
            echo "| --- | --- | --- | --- | --- |"
            jq -r '.[] | "| \(.app) | \(.digest) | `\(.promotion_key)` | \(.decision) | \(.reason // "-") |"' <<<"$decisions"
          } >> "$GITHUB_STEP_SUMMARY"
