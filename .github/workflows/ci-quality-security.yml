name: CI Quality and Security

on:
  workflow_call:
    inputs:
      node_version:
        required: false
        type: string
        default: "24.11.0"
      pnpm_version:
        required: false
        type: string
        default: "10.20.0"
      event_name:
        required: false
        type: string
        default: ""
      ref_name:
        required: false
        type: string
        default: ""
      base_ref:
        required: false
        type: string
        default: ""
permissions:
  actions: read
  contents: read
  pull-requests: read
  security-events: write

concurrency:
  group: ci-quality-security-${{ github.workflow_ref }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'push' }}

env:
  CI: "true"
  NODE_VERSION: ${{ inputs.node_version }}
  PNPM_VERSION: ${{ inputs.pnpm_version }}

jobs:
  check_dependency_review:
    name: Security Dependency Review Availability
    if: inputs.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      enabled: ${{ steps.probe.outputs.enabled }}

    steps:
      - name: Probe GitHub Dependency Review API
        id: probe
        env:
          GH_TOKEN: ${{ github.token }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          http_code=$(curl -s -o /tmp/dependency-review-probe.json -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/dependency-graph/compare/${BASE_SHA}...${HEAD_SHA}")

          if [ "$http_code" = '200' ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping dependency review because GitHub dependency review is unavailable for this repository (HTTP ${http_code})."
          fi

  dependency_review:
    name: Security Dependency Review
    needs: [check_dependency_review]
    if: inputs.event_name == 'pull_request' && needs.check_dependency_review.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.3

      - name: Review dependency changes
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure

  check_code_scanning:
    name: Security Code Scanning Availability
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      enabled: ${{ steps.probe.outputs.enabled }}

    steps:
      - name: Probe GitHub Code Scanning API
        id: probe
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          http_code=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/code-scanning/alerts?per_page=1")

          if [ "$http_code" = '200' ] || [ "$http_code" = '204' ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

  security_sast_scan:
    name: Security Snyk Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    steps:
      - name: Check out repository
        if: env.SNYK_TOKEN != ''
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.3

      - name: Setup pnpm
        if: env.SNYK_TOKEN != ''
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.1.0
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        if: env.SNYK_TOKEN != ''
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        if: env.SNYK_TOKEN != ''
        run: pnpm install --frozen-lockfile

      - name: Run Snyk
        if: env.SNYK_TOKEN != ''
        uses: snyk/actions/node@9adf32b1121593767fc3c057af55b55db032dc04 # v0.4.0
        continue-on-error: true
        with:
          args: --sarif-file-output=snyk.sarif --all-projects

      - name: Upload Snyk SARIF
        if: always() && env.SNYK_TOKEN != '' && hashFiles('snyk.sarif') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.6.2
        with:
          name: snyk-sarif
          path: snyk.sarif
          retention-days: 30

  security_codeql_analysis:
    name: Security CodeQL Analysis
    needs: [check_code_scanning]
    if: needs.check_code_scanning.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.3
        with:
          fetch-depth: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          languages: javascript-typescript
          queries: security-extended,security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          category: /language:javascript-typescript

  validate_deploy_bases:
    name: Quality Deployment Asset Validation
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.3

      - name: Install Helm
        run: |
          HELM_VERSION="v3.17.3"
          mkdir -p "$RUNNER_TEMP/bin"
          curl -fsSL "https://get.helm.sh/helm-${HELM_VERSION}-linux-amd64.tar.gz" | \
            tar -xzO linux-amd64/helm > "$RUNNER_TEMP/bin/helm"
          chmod +x "$RUNNER_TEMP/bin/helm"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/bin/helm" version

      - name: Install kubectl
        run: |
          KUBECTL_VERSION="v1.32.4"
          mkdir -p "$RUNNER_TEMP/bin"
          curl -fsSL "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl" \
            -o "$RUNNER_TEMP/bin/kubectl"
          chmod +x "$RUNNER_TEMP/bin/kubectl"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/bin/kubectl" version --client

      - name: Lint application base chart
        run: |
          if [ -d deploy/helm/charts/application-base ]; then
            helm lint deploy/helm/charts/application-base
          else
            echo "::notice::No application base chart found."
          fi

      - name: Render Helm values
        run: |
          if [ -d deploy/helm/values ]; then
            for values_file in deploy/helm/values/*.yaml; do
              [ -f "$values_file" ] || continue
              helm template ethio-connect deploy/helm/charts/application-base \
                --values "$values_file" > /dev/null
            done
          else
            echo "::notice::No Helm values directory found."
          fi

      - name: Render Kustomize bases
        run: |
          if [ -d deploy/kustomize/base ]; then
            kubectl kustomize deploy/kustomize/base > /dev/null
            while IFS= read -r base_dir; do
              kubectl kustomize "$base_dir" > /dev/null
            done < <(find deploy/kustomize/base -mindepth 1 -maxdepth 1 -type d | sort)
          else
            echo "::notice::No Kustomize base directory found."
          fi

  quality_validation_gate:
    name: Quality Nx Validation
    needs: [validate_deploy_bases]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.3
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.1.0
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Derive Nx SHAs
        id: nx-shas
        uses: nrwl/nx-set-shas@afb73a62d26e41464e9254689e1fd6122ee683c1 # v4.3.0

      - name: Resolve Nx base and head
        run: |
          nx_base="${{ steps.nx-shas.outputs.base }}"
          nx_head="${{ steps.nx-shas.outputs.head }}"

          if [ -z "$nx_base" ]; then
            nx_base="$(git rev-parse HEAD~1)"
          fi

          if [ -z "$nx_head" ]; then
            nx_head="$(git rev-parse HEAD)"
          fi

          {
            echo "NX_BASE=${nx_base}"
            echo "NX_HEAD=${nx_head}"
          } >> "$GITHUB_ENV"

      - name: Start Nx Cloud CI run
        if: env.NX_CLOUD_ACCESS_TOKEN != ''
        run: pnpm exec nx start-ci-run --distribute-on="3 linux-medium-js" --stop-agents-after="build"

      - name: Check formatting
        run: pnpm exec nx format:check

      - name: Core quality gate (affected lint/typecheck/build/test)
        run: pnpm exec nx affected -t lint typecheck build test --base="$NX_BASE" --head="$NX_HEAD" --parallel=1

      - name: Resolve affected Playwright projects
        id: affected-playwright
        run: |
          projects="$(pnpm exec nx show projects --affected --withTarget=e2e-ci --base="$NX_BASE" --head="$NX_HEAD" \
            | rg -v '(client-api-server-e2e|vendor-api-server-e2e|central-hub-api-e2e)$' \
            | paste -sd, -)"

          if [ -n "$projects" ]; then
            echo "has_projects=true" >> "$GITHUB_OUTPUT"
            echo "projects=$projects" >> "$GITHUB_OUTPUT"
          else
            echo "has_projects=false" >> "$GITHUB_OUTPUT"
            echo "projects=" >> "$GITHUB_OUTPUT"
            echo "::notice::No affected Playwright e2e-ci projects detected."
          fi

      - name: Install Playwright browsers (affected projects only)
        if: steps.affected-playwright.outputs.has_projects == 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Run affected Playwright e2e-ci targets
        if: steps.affected-playwright.outputs.has_projects == 'true'
        run: |
          pnpm exec nx affected \
            -t e2e-ci \
            --projects="${{ steps.affected-playwright.outputs.projects }}" \
            --base="$NX_BASE" \
            --head="$NX_HEAD" \
            --parallel=2

      - name: Resolve affected API e2e projects
        id: affected-api-e2e
        run: |
          projects="$(pnpm exec nx show projects --affected --withTarget=e2e-ci --base="$NX_BASE" --head="$NX_HEAD" \
            | rg '(client-api-server-e2e|vendor-api-server-e2e|central-hub-api-e2e)$' \
            | paste -sd, -)"

          if [ -n "$projects" ]; then
            echo "has_projects=true" >> "$GITHUB_OUTPUT"
            echo "projects=$projects" >> "$GITHUB_OUTPUT"
          else
            echo "has_projects=false" >> "$GITHUB_OUTPUT"
            echo "projects=" >> "$GITHUB_OUTPUT"
            echo "::notice::No affected API e2e-ci projects detected."
          fi

      - name: Start API e2e services (explicit setup, no implicit migrations)
        if: steps.affected-api-e2e.outputs.has_projects == 'true'
        run: |
          if [ -f docker-compose.api-e2e.yml ]; then
            docker compose -f docker-compose.api-e2e.yml up -d --wait
          else
            echo "::warning::Affected API e2e-ci targets detected but docker-compose.api-e2e.yml is missing."
            echo "::warning::Ensure e2e-ci target provisions dependencies explicitly and avoids implicit DB migration side effects."
          fi

      - name: Run affected API e2e-ci targets
        if: steps.affected-api-e2e.outputs.has_projects == 'true'
        run: |
          pnpm exec nx affected \
            -t e2e-ci \
            --projects="${{ steps.affected-api-e2e.outputs.projects }}" \
            --base="$NX_BASE" \
            --head="$NX_HEAD" \
            --parallel=1

      - name: Stop API e2e services
        if: always() && steps.affected-api-e2e.outputs.has_projects == 'true'
        run: |
          if [ -f docker-compose.api-e2e.yml ]; then
            docker compose -f docker-compose.api-e2e.yml down --volumes --remove-orphans
          fi

      - name: Finalize Nx Cloud CI run
        if: always() && env.NX_CLOUD_ACCESS_TOKEN != ''
        run: pnpm exec nx fix-ci
