name: CI Orchestrator

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'apps/**'
      - 'libs/**'
      - 'tools/**'
      - '.github/workflows/orchestrator.yml'
      - '.github/workflows/reusable-build-test-lint.yml'
      - '.github/actions/setup-nx-node/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'nx.json'
      - 'tsconfig.base.json'
      - 'eslint.config.mjs'
      - 'jest.config.ts'
      - 'jest.preset.js'
  push:
    branches: [testing, staging, main]
    paths:
      - 'apps/**'
      - 'libs/**'
      - 'gitops/**'
      - '.github/workflows/orchestrator.yml'
      - '.github/workflows/reusable-container-publish.yml'
      - '.github/workflows/reusable-manifest-promotion-trigger.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'

permissions:
  actions: read
  contents: read

env:
  CI: true
  NODE_VERSION: '24.11.0'
  PNPM_VERSION: '10.20.0'
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

concurrency:
  group: ci-orchestrator-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:

  prep_policy:
    name: Prep · Trigger and Release Policy
    runs-on: ubuntu-latest
    outputs:
      can_publish: ${{ steps.policy.outputs.can_publish }}
      target_environment: ${{ steps.policy.outputs.target_environment }}
    steps:
      - name: Evaluate trigger and release policy
        id: policy
        shell: bash
        run: |
          set -euo pipefail
          can_publish=false
          target_environment=testing

          if [[ "${{ github.event_name }}" == "push" ]]; then
            case "${{ github.ref_name }}" in
              testing)
                can_publish=true
                target_environment=testing
                ;;
              staging)
                can_publish=true
                target_environment=staging
                ;;
              main)
                can_publish=true
                target_environment=production
                ;;
            esac
          fi

          {
            echo "can_publish=${can_publish}"
            echo "target_environment=${target_environment}"
          } >> "$GITHUB_OUTPUT"

  plan:
    name: Plan · Affected Partition
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      quality_projects: ${{ steps.partition.outputs.quality_projects }}
      docker_build_projects: ${{ steps.partition.outputs.docker_build_projects }}
      release_publish_projects: ${{ steps.partition.outputs.release_publish_projects }}
      has_quality: ${{ steps.partition.outputs.has_quality }}
      has_docker_build: ${{ steps.partition.outputs.has_docker_build }}
      has_release_publish: ${{ steps.partition.outputs.has_release_publish }}
      has_manifest_promotion: ${{ steps.partition.outputs.has_manifest_promotion }}
      tag_context: ${{ steps.partition.outputs.tag_context }}
      nx_base: ${{ steps.resolve-shas.outputs.nx_base }}
      nx_head: ${{ steps.resolve-shas.outputs.nx_head }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-nx-node
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}
      - name: Resolve base/head range
        id: resolve-shas
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch --no-tags origin "${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"
            nx_base="origin/${{ github.base_ref }}"
            nx_head="${{ github.sha }}"
          else
            git fetch --no-tags origin "${{ github.event.before }}:refs/remotes/origin/${{ github.event.before }}" || true
            nx_base="${{ github.event.before }}"
            nx_head="${{ github.sha }}"
          fi

          echo "NX_BASE=${nx_base}" >> "$GITHUB_ENV"
          echo "NX_HEAD=${nx_head}" >> "$GITHUB_ENV"
          echo "nx_base=${nx_base}" >> "$GITHUB_OUTPUT"
          echo "nx_head=${nx_head}" >> "$GITHUB_OUTPUT"

      - name: Validate Nx target contracts
        shell: bash
        run: |
          set -euo pipefail
          node tools/ci/validate-project-targets.mjs

      - name: Validate release scope contract
        shell: bash
        run: |
          set -euo pipefail
          node tools/ci/validate-release-scope.mjs

      - name: Enforce secret handling policy
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/check-no-plaintext-secrets.sh

      - name: Partition affected projects
        id: partition
        shell: bash
        run: |
          set -euo pipefail
          affected_json="$(pnpm nx show projects --affected --base="$NX_BASE" --head="$NX_HEAD" --json)"
          quality_json="$(jq -c '.' <<<"$affected_json")"
          docker_json="$(pnpm nx show projects --affected --withTarget=docker:build --base="$NX_BASE" --head="$NX_HEAD" --json)"
          release_json="$(pnpm nx show projects --affected --withTarget=nx-release-publish --base="$NX_BASE" --head="$NX_HEAD" --json)"
          has_quality="$(jq -r 'if length>0 then "true" else "false" end' <<<"$quality_json")"
          has_docker="$(jq -r 'if length>0 then "true" else "false" end' <<<"$docker_json")"
          has_release="$(jq -r 'if length>0 then "true" else "false" end' <<<"$release_json")"
          has_manifest_promotion="$has_docker"
          tag_context="$(jq -cn --arg ref "${{ github.ref_name }}" --arg sha "${{ github.sha }}" '{ref_name:$ref,sha:$sha}')"
          {
            echo "quality_projects=$quality_json"
            echo "docker_build_projects=$docker_json"
            echo "release_publish_projects=$release_json"
            echo "has_quality=$has_quality"
            echo "has_docker_build=$has_docker"
            echo "has_release_publish=$has_release"
            echo "has_manifest_promotion=$has_manifest_promotion"
            echo "tag_context=$tag_context"
          } >> "$GITHUB_OUTPUT"

  quality:
    name: Quality Lane
    needs: [plan]
    if: needs.plan.outputs.has_quality == 'true'
    uses: ./.github/workflows/reusable-build-test-lint.yml
    secrets: inherit
    with:
      ref_name: ${{ github.ref_name }}
      event_name: ${{ github.event_name }}
      pull_request_draft: ${{ github.event_name == 'pull_request' && github.event.pull_request.draft || false }}
      pull_request_number: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || 0 }}
      projects_json: ${{ needs.plan.outputs.quality_projects }}
      nx_base: ${{ needs.plan.outputs.nx_base }}
      nx_head: ${{ needs.plan.outputs.nx_head }}

  docker_build:
    name: Docker Build/Publish Lane
    needs: [prep_policy, plan]
    if: needs.plan.outputs.has_release_publish == 'true' && needs.prep_policy.outputs.can_publish == 'true'
    uses: ./.github/workflows/reusable-container-publish.yml
    secrets: inherit
    with:
      ref_name: ${{ github.ref_name }}
      event_name: ${{ github.event_name }}
      projects_json: ${{ needs.plan.outputs.release_publish_projects }}
      tag_context_json: ${{ needs.plan.outputs.tag_context }}
      nx_base: ${{ needs.plan.outputs.nx_base }}
      nx_head: ${{ needs.plan.outputs.nx_head }}

  ci_summary:
    name: CI Summary
    needs: [plan, quality, docker_build]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Download quality metrics
        if: needs.quality.result != 'skipped'
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16
        with:
          name: ci-metrics-quality
          path: ci-metrics

      - name: Download docker metrics
        if: needs.docker_build.result != 'skipped'
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16
        with:
          name: ci-metrics-docker-build
          path: ci-metrics

      - name: Build CI summary
        shell: bash
        run: |
          set -euo pipefail
          affected_count=$(jq 'length' <<< '${{ needs.plan.outputs.quality_projects }}')
          if [[ -f ci-metrics/ci-metrics-quality.json ]]; then
            cache_hits=$(jq -r '.cache_hits' ci-metrics/ci-metrics-quality.json)
            cache_misses=$(jq -r '.cache_misses' ci-metrics/ci-metrics-quality.json)
            duration_seconds=$(jq -r '.duration_seconds' ci-metrics/ci-metrics-quality.json)
            dependency_cache_hit=$(jq -r '.dependency_cache_hit // false' ci-metrics/ci-metrics-quality.json)
            dependency_cache_key=$(jq -r '.dependency_cache_key // ""' ci-metrics/ci-metrics-quality.json)
            nx_cloud_run_url=$(jq -r '.nx_cloud_run_url' ci-metrics/ci-metrics-quality.json)
          else
            cache_hits=0
            cache_misses=0
            duration_seconds=0
            dependency_cache_hit=false
            dependency_cache_key=""
            nx_cloud_run_url=""
          fi

          cache_total=$((cache_hits + cache_misses))
          if [[ $cache_total -gt 0 ]]; then
            hit_rate=$(awk -v hits="$cache_hits" -v total="$cache_total" 'BEGIN { printf "%.1f", (hits/total)*100 }')
          else
            hit_rate="n/a"
          fi

          baseline_seconds=900
          duration_delta=$((duration_seconds - baseline_seconds))
          baseline_hit_rate=40
          sla_reduction_target=50
          quality_hit_rate_numeric=$(awk -v v="$hit_rate" 'BEGIN { if (v=="n/a") print 0; else print v }')
          quality_hit_uplift=$(awk -v cur="$quality_hit_rate_numeric" -v base="$baseline_hit_rate" 'BEGIN { printf "%.1f", cur-base }')

          docker_status="skipped"
          if [[ -f ci-metrics/ci-metrics-docker-build.json ]]; then
            docker_status=$(jq -r '.status // "completed"' ci-metrics/ci-metrics-docker-build.json)
          fi

          {
            echo "## CI Lane Summary"
            echo ""
            echo "- Affected projects: **${affected_count}**"
            echo "- Dependency cache (pnpm store) hit: **${dependency_cache_hit}**"
            echo "- Dependency cache key: \`${dependency_cache_key:-n/a}\`"
            echo "- Nx task cache hits/misses (quality lane): **${cache_hits}/${cache_misses}** (hit rate: **${hit_rate}%**)"
            echo "- Duration (quality lane): **${duration_seconds}s** (delta vs baseline ${baseline_seconds}s: **${duration_delta}s**)"
            echo "- Cache uplift (quality lane) vs baseline ${baseline_hit_rate}%: **${quality_hit_uplift}%**"
            echo "- SLA objective (>50% duration reduction): **target ${sla_reduction_target}%**, current duration delta **${duration_delta}s**"
            echo "- Docker lane cache tracking status: **${docker_status}**"
            if [[ -n "$nx_cloud_run_url" ]]; then
              echo "- Nx Cloud run metadata: ${nx_cloud_run_url}"
            else
              echo "- Nx Cloud run metadata: _not captured_"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  manifest_promotion_trigger:
    name: Manifest Promotion Trigger Lane
    needs: [prep_policy, plan, docker_build]
    if: needs.plan.outputs.has_manifest_promotion == 'true' && needs.prep_policy.outputs.can_publish == 'true' && needs.prep_policy.outputs.target_environment != 'production'
    uses: ./.github/workflows/reusable-manifest-promotion-trigger.yml
    secrets: inherit
    with:
      ref_name: ${{ needs.prep_policy.outputs.target_environment }}
      source_sha: ${{ github.sha }}
      publish_manifest_artifact_name: publish-image-metadata-${{ needs.prep_policy.outputs.target_environment }}-${{ github.run_id }}
