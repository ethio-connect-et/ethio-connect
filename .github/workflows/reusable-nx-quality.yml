name: Reusable Nx Quality

on:
  workflow_call:
    inputs:
      node_version:
        required: false
        type: string
        default: '22'

permissions:
  contents: read
  actions: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node_version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: nrwl/nx-set-shas@v4
      - name: Nx format check
        run: pnpm nx format:check
      - name: Nx affected lint
        run: pnpm nx affected -t lint --parallel=6
      - name: Nx affected type-check
        run: pnpm nx affected -t type-check --parallel=6
      - name: Nx affected test
        run: pnpm nx affected -t test --parallel=6
      - name: Nx affected build
        run: pnpm nx affected -t build --parallel=4
