name: Staged CI/CD Pipeline

on:
  push:
    branches: [development, testing, staging, production, main]
  pull_request:
    branches: [development, testing, staging, production, main]
  workflow_dispatch:
    inputs:
      promote_to:
        description: Promotion stage override
        required: false
        type: choice
        options: [testing, staging, production]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  resolve-promotion:
    runs-on: ubuntu-latest
    outputs:
      promotion_stage: ${{ steps.resolve.outputs.promotion_stage }}
      image_tag: ${{ steps.resolve.outputs.image_tag }}
    steps:
      - id: resolve
        run: |
          stage="none"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.promote_to }}" ]]; then
            stage="${{ github.event.inputs.promote_to }}"
          elif [[ "${GITHUB_REF}" == "refs/heads/testing" ]]; then
            stage="testing"
          elif [[ "${GITHUB_REF}" == "refs/heads/staging" ]]; then
            stage="staging"
          elif [[ "${GITHUB_REF}" == "refs/heads/production" || "${GITHUB_REF}" == "refs/heads/main" ]]; then
            stage="production"
          fi

          image_tag="testing"
          [[ "$stage" == "staging" ]] && image_tag="staging"
          [[ "$stage" == "production" ]] && image_tag="latest"

          echo "promotion_stage=$stage" >> "$GITHUB_OUTPUT"
          echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"

  quality:
    uses: ./.github/workflows/reusable-nx-quality.yml
    needs: resolve-promotion

  security:
    uses: ./.github/workflows/reusable-security-scan.yml
    needs: resolve-promotion

  container:
    needs: [resolve-promotion, quality, security]
    if: github.event_name == 'push' && needs.resolve-promotion.outputs.promotion_stage != 'none'
    uses: ./.github/workflows/reusable-container.yml
    with:
      image_tag: ${{ needs.resolve-promotion.outputs.image_tag }}

  manifest-update:
    name: Manifest update via PR per environment
    needs: [resolve-promotion, container]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && needs.resolve-promotion.outputs.promotion_stage != 'none'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Download image metadata
        uses: actions/download-artifact@v4
        with:
          pattern: image-metadata*
          path: image-metadata
          merge-multiple: true
      - name: Checkout manifest repository
        uses: actions/checkout@v5
        with:
          repository: ethio-connect-et/ethio-connect-manifest
          token: ${{ secrets.GH_TOKEN }}
          path: ethio-connect-manifest
      - name: Update deployment manifests and env metadata
        working-directory: ethio-connect-manifest
        run: |
          stage="${{ needs.resolve-promotion.outputs.promotion_stage }}"
          mkdir -p environments/${stage}/updates
          cp -r ../image-metadata environments/${stage}/updates/image-metadata
      - name: Create promotion PR to manifest repo
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GH_TOKEN }}
          path: ethio-connect-manifest
          commit-message: ci: promote ${{ github.sha }} to ${{ needs.resolve-promotion.outputs.promotion_stage }}
          branch: ci/promotion/${{ needs.resolve-promotion.outputs.promotion_stage }}/${{ github.run_id }}
          title: ci: promote ${{ needs.resolve-promotion.outputs.promotion_stage }} from ${{ github.sha }}
