name: Staged CI/CD Pipeline

on:
  push:
    branches:
      - development
      - testing
      - staging
      - production
      - main
  pull_request:
    branches:
      - development
      - testing
      - staging
      - production
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 20
  TRIVY_SEVERITY: CRITICAL,HIGH

jobs:
  preflight:
    name: Preflight (format/lint/type-check)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm nx format:check

      - name: Lint (affected)
        run: pnpm nx affected --target=lint --parallel=3

      - name: Type check (affected)
        run: pnpm nx affected --target=type-check --parallel=3

  dependency-audit:
    name: Dependency audit (fail on critical)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@6e7b7d1fd3e4fef0c5fa8cce1229c54b2c9bd0d8 
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: Upload dependency scan results
        uses: github/codeql-action/upload-sarif@865f5f5c36632f18690a3d569fa0a764f2da0c3e
        if: always()
        with:
          sarif_file: trivy-fs.sarif

  affected-build-test:
    name: Affected build & test
    needs:
      - preflight
      - dependency-audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Affected build
        run: pnpm nx affected --target=build --parallel=3

      - name: Affected test
        run: pnpm nx affected --target=test --parallel=3

      - name: Archive build outputs
        uses: actions/upload-artifact@v4
        with:
          name: nx-build-outputs
          path: |
            dist/**
            !**/*.map
          if-no-files-found: warn
          retention-days: 7

  container-build-push:
    name: Container build, scan, sign & attest
    needs: affected-build-test
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/testing' ||
      github.ref == 'refs/heads/staging' ||
      github.ref == 'refs/heads/production' ||
      github.ref == 'refs/heads/main')
    environment: >-
      ${{ github.ref == 'refs/heads/testing' && 'testing' ||
          github.ref == 'refs/heads/staging' && 'staging' ||
          (github.ref == 'refs/heads/production' || github.ref == 'refs/heads/main') && 'production' || '' }}
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        app: [vendor-portal, customer-portal, central-hub]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build outputs
        uses: actions/download-artifact@v4
        with:
          name: nx-build-outputs
          path: dist

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@4959ce089c160fddf62f7b42464195ba1a56d382

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.app }}
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/production' || github.ref == 'refs/heads/main' }}
            type=raw,value=staging,enable=${{ github.ref == 'refs/heads/staging' }}
            type=raw,value=testing,enable=${{ github.ref == 'refs/heads/testing' }}

      - name: Build and push image
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true

      - name: Vulnerability scan image (fail on CRITICAL)
        uses: aquasecurity/trivy-action@6e7b7d1fd3e4fef0c5fa8cce1229c54b2c9bd0d8 
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/${{ matrix.app }}@${{ steps.build-push.outputs.digest }}
          format: sarif
          output: trivy-image-${{ matrix.app }}.sarif
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: Upload image scan results
        uses: github/codeql-action/upload-sarif@865f5f5c36632f18690a3d569fa0a764f2da0c3e
        if: always()
        with:
          sarif_file: trivy-image-${{ matrix.app }}.sarif

      - name: Generate SBOM (SPDX JSON)
        uses: anchore/sbom-action@v0.17.7
        with:
          image: ghcr.io/${{ github.repository_owner }}/${{ matrix.app }}@${{ steps.build-push.outputs.digest }}
          format: spdx-json
          output-file: sbom-${{ matrix.app }}.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.app }}
          path: sbom-${{ matrix.app }}.spdx.json
          if-no-files-found: error

      - name: Sign image (keyless)
        env:
          COSIGN_EXPERIMENTAL: 'true'
        run: |
          cosign sign --yes ghcr.io/${{ github.repository_owner }}/${{ matrix.app }}@${{ steps.build-push.outputs.digest }}

      - name: Attest SBOM provenance (keyless)
        env:
          COSIGN_EXPERIMENTAL: 'true'
        run: |
          cosign attest --yes \
            --predicate sbom-${{ matrix.app }}.spdx.json \
            --type spdxjson \
            ghcr.io/${{ github.repository_owner }}/${{ matrix.app }}@${{ steps.build-push.outputs.digest }}

      - name: Export immutable image metadata
        run: |
          mkdir -p image-metadata
          cat > image-metadata/${{ matrix.app }}.json <<EOF_META
          {
            "app": "${{ matrix.app }}",
            "image": "ghcr.io/${{ github.repository_owner }}/${{ matrix.app }}@${{ steps.build-push.outputs.digest }}",
            "digest": "${{ steps.build-push.outputs.digest }}",
            "branch": "${{ github.ref_name }}",
            "sha": "${{ github.sha }}"
          }
          EOF_META

      - name: Upload image metadata
        uses: actions/upload-artifact@v4
        with:
          name: image-metadata-${{ matrix.app }}
          path: image-metadata/${{ matrix.app }}.json
          if-no-files-found: error
          retention-days: 14

  package-publish:
    name: Package publish
    needs:
      - affected-build-test
      - container-build-push
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/staging' ||
      github.ref == 'refs/heads/production' ||
      github.ref == 'refs/heads/main')
    environment: >-
      ${{ github.ref == 'refs/heads/staging' && 'staging' || 'production' }}
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Download build outputs
        uses: actions/download-artifact@v4
        with:
          name: nx-build-outputs
          path: dist

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm -r --filter ./packages/* publish --access public --no-git-checks

      - name: Upload publish manifest
        run: |
          mkdir -p package-metadata
          cat > package-metadata/publish.json <<EOF
          {
            "branch": "${{ github.ref_name }}",
            "sha": "${{ github.sha }}",
            "publishedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Upload package metadata
        uses: actions/upload-artifact@v4
        with:
          name: package-publish-metadata
          path: package-metadata/publish.json
          if-no-files-found: error

  manifest-update:
    name: Manifest update (immutable digests)
    needs:
      - container-build-push
      - package-publish
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/testing' ||
      github.ref == 'refs/heads/staging' ||
      github.ref == 'refs/heads/production' ||
      github.ref == 'refs/heads/main')
    environment: >-
      ${{ github.ref == 'refs/heads/testing' && 'testing' ||
          github.ref == 'refs/heads/staging' && 'staging' || 'production' }}
    permissions:
      contents: read
    steps:
      - name: Download image metadata
        uses: actions/download-artifact@v4
        with:
          pattern: image-metadata-*
          path: image-metadata
          merge-multiple: true

      - name: Download package publish metadata
        uses: actions/download-artifact@v4
        with:
          name: package-publish-metadata
          path: package-metadata

      - name: Checkout manifest repository
        uses: actions/checkout@v4
        with:
          repository: ethio-connect-et/ethio-connect-manifest
          token: ${{ secrets.GH_TOKEN }}
          path: ethio-connect-manifest

      - name: Update deployment manifests with immutable references
        working-directory: ethio-connect-manifest
        run: |
          mkdir -p updates
          cp -r ../image-metadata updates/image-metadata
          cp -r ../package-metadata updates/package-metadata
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "ci: update manifests for ${{ github.sha }} (digest-pinned images)" || echo "No changes to commit"
          git push origin HEAD:${{ github.ref_name }}
