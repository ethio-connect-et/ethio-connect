name: Release Attestation

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      docker_version:
        required: true
        type: string
      short_sha:
        required: true
        type: string

env:
  CI: true
  NODE_VERSION: '24.11.0'
  PNPM_VERSION: '10.20.0'

jobs:
  attestation:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          fetch-depth: 1

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: |
          pnpm fetch --frozen-lockfile
          pnpm install --frozen-lockfile --prefer-offline

      - name: Authenticate with GitHub Container Registry
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build release evidence attestation
        id: build_attestation
        shell: bash
        run: |
          set -euo pipefail
          source scripts/manifest-dispatch.sh
          version="${{ inputs.version }}"
          docker_version="${{ inputs.docker_version }}"
          short_sha="${{ inputs.short_sha }}"
          apps_json='[]'
          while IFS= read -r project; do
            [[ -z "$project" ]] && continue
            app="${project#@ethio-connect/}"
            image_ref="${REGISTRY_PREFIX}/${app}:${docker_version}"
            digest="$(docker buildx imagetools inspect "$image_ref" --format '{{json .Manifest}}' | jq -r '.digest')"
            [[ "$digest" =~ $DIGEST_REGEX ]] || { echo "::error::Invalid digest for ${app}: ${digest}"; exit 1; }
            apps_json="$(jq -c --arg app "$app" --arg digest "$digest" '. + [{app:$app,digest:$digest}]' <<<"$apps_json")"
          done < <(resolve_apps_with_docker_target)

          jq -n \
            --arg version "$version" \
            --arg docker_version "$docker_version" \
            --arg release_sha "$GITHUB_SHA" \
            --arg short_sha "$short_sha" \
            --arg tag_ref "${GITHUB_REF}" \
            --arg generated_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg env "production" \
            --argjson apps "$apps_json" \
            '{
              version:$version,
              docker_version:$docker_version,
              release_sha:$release_sha,
              short_sha:$short_sha,
              tag_ref:$tag_ref,
              env:$env,
              generated_at:$generated_at,
              apps:$apps
            }' | jq -cS . > promotion-attestation.json
          echo "path=promotion-attestation.json" >> "$GITHUB_OUTPUT"

      - name: Upload promotion attestation artifact
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808
        with:
          name: promotion-attestation
          path: ${{ steps.build_attestation.outputs.path }}
