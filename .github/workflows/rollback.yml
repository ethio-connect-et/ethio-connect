name: Rollback Deployment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to roll back (metadata only)'
        required: true
        type: choice
        options: [testing, staging, production]
      reason:
        description: 'Reason for rollback'
        required: true
        type: string

permissions: {}

jobs:
  rollback_metadata_only:
    name: Rollback · Metadata Only (Deprecated Legacy Mode)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
      - name: Legacy mode warning banner
        shell: bash
        run: |
          {
            echo "## ⚠️ Legacy Rollback Workflow"
            echo ""
            echo "This workflow no longer performs image re-tagging or production GitOps changes."
            echo "Open a manifest-repository rollback PR against the target manifest branch."
            echo ""
            echo "Requested environment: \`${{ github.event.inputs.environment }}\`"
            echo "Reason: \`${{ github.event.inputs.reason }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
