name: Reusable Container Publish

on:
  workflow_call:
    inputs:
      projects_json:
        required: true
        type: string
      tag_context_json:
        required: true
        type: string
      ref_name:
        required: true
        type: string
      event_name:
        required: true
        type: string
      nx_base:
        required: true
        type: string
      nx_head:
        required: true
        type: string
    secrets:
      NX_CLOUD_ACCESS_TOKEN:
        required: true
    outputs:
      image_tag:
        description: 'The Docker image tag generated during publishing.'
        value: ${{ jobs.container_publish.outputs.image_tag }}
      short_sha:
        description: 'Immutable short commit SHA tag emitted for all images.'
        value: ${{ jobs.container_publish.outputs.short_sha }}
      canonical_release_version:
        description: 'Canonical release version tag (SemVer for main, SemVer prerelease for non-main).'
        value: ${{ jobs.container_publish.outputs.canonical_release_version }}

env:
  CI: true
  NODE_VERSION: '24.11.0'
  PNPM_VERSION: '10.20.0'
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
  DOCKER_BUILDKIT: 1

jobs:
  container_publish:
    name: Container · Publish
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.publish-context.outputs.image_tag }}
      short_sha: ${{ steps.publish-context.outputs.short_sha }}
      canonical_release_version: ${{ steps.publish-context.outputs.canonical_release_version }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v4.2.2
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-nx-node
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Set publish context
        id: publish-context
        shell: bash
        run: |
          set -euo pipefail
          branch_label="$(echo '${{ inputs.ref_name }}' | tr '[:upper:]' '[:lower:]' | sed 's#[^a-z0-9_.-]#-#g')"
          short_sha="$(git rev-parse --short=12 "${GITHUB_SHA}")"
          if [[ "${{ inputs.ref_name }}" == "main" ]]; then
            canonical_release_version="0.0.0+${short_sha}"
            image_tag="${canonical_release_version}"
          else
            canonical_release_version="0.0.0-${branch_label}.${short_sha}"
            image_tag="${canonical_release_version}"
          fi
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          {
            echo "image_tag=${image_tag}"
            echo "short_sha=${short_sha}"
            echo "branch_label=${branch_label}"
            echo "canonical_release_version=${canonical_release_version}"
            echo "build_date=${build_date}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.11.1
      - name: Log in to GHCR
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          {
            registry: ghcr.io,
            username: '${{ github.actor }}',
            password: '${{ secrets.GITHUB_TOKEN }}',
          }

      - name: Build images (Stage A)
        shell: bash
        env:
          IMAGE_TAG: ${{ steps.publish-context.outputs.image_tag }}
          BRANCH_TAG: ${{ steps.publish-context.outputs.branch_label }}
          BUILD_NUMBER: ${{ github.run_number }}
          COMMIT_SHA: ${{ github.sha }}
          BUILD_DATE: ${{ steps.publish-context.outputs.build_date }}
          VERSION: ${{ steps.publish-context.outputs.image_tag }}
          NX_IMAGE_TAG: ${{ steps.publish-context.outputs.image_tag }}
          NX_DOCKER_TAG: ${{ steps.publish-context.outputs.image_tag }}
          NX_DOCKER_VERSION: ${{ steps.publish-context.outputs.image_tag }}
          NX_DOCKER_BRANCH_TAG: ${{ steps.publish-context.outputs.branch_label }}
          NX_DOCKER_VERSION_SCHEME: production
          RELEASE_VERSION: ${{ steps.publish-context.outputs.canonical_release_version }}
        run: |
          set -euo pipefail
          projects=$(jq -r 'join(",")' <<< '${{ inputs.projects_json }}')
          [[ -n "$projects" ]] || {
            echo 'No docker build projects in optimization hint; writing deterministic skip artifact.'
            echo '{"lane":"docker_build","status":"skipped-no-affected"}' > ci-metrics-docker-build.json
            exit 0
          }
          [[ -n "${IMAGE_TAG:-}" ]] || { echo "::error::IMAGE_TAG is required"; exit 1; }
          [[ -n "${BRANCH_TAG:-}" ]] || { echo "::error::BRANCH_TAG is required"; exit 1; }
          [[ "$IMAGE_TAG" != "latest" ]] || { echo "::error::IMAGE_TAG must not be latest"; exit 1; }
          [[ "$BRANCH_TAG" != "latest" ]] || { echo "::error::BRANCH_TAG must not be latest"; exit 1; }
          pnpm nx run-many -t docker:build --projects "$projects" --outputStyle=static

      - name: Upload docker lane skip marker
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808
        with:
          name: ci-metrics-docker-build
          path: ci-metrics-docker-build.json
          if-no-files-found: ignore

      - name: Security scan built container images (Trivy gate)
        id: scan-gate
        shell: bash
        env:
          IMAGE_TAG: ${{ steps.publish-context.outputs.image_tag }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/trivy/reports

          projects="$(jq -r '.[]' <<< '${{ inputs.projects_json }}')"
          [[ -n "$projects" ]] || {
            echo "scan_gate_status=skipped-no-projects" >> "$GITHUB_OUTPUT"
            echo "::notice::Trivy gate skipped — no projects to scan."
            exit 0
          }

          # ── Install Trivy ──────────────────────────────────────────────────
          echo "::group::Install Trivy"
          sudo apt-get update -y -qq
          sudo apt-get install -y -qq wget
          wget -qO- https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sudo sh -s -- -b /usr/local/bin
          trivy --version
          echo "::endgroup::"

          # ── Summary header ─────────────────────────────────────────────────
          failed=0
          total_critical=0
          total_high=0
          skipped_missing=0
          {
            echo "## Container Security Scan (Trivy)"
            echo ""
            echo "| App | Image Ref | CRITICAL | HIGH | Gate |"
            echo "|---|---|---:|---:|---|"
          } >> "$GITHUB_STEP_SUMMARY"

          # ── Per-image scan loop ────────────────────────────────────────────
          while IFS= read -r project; do
            app="${project#@ethio-connect/}"
            image_ref="ghcr.io/ethio-connect-et/${app}:${IMAGE_TAG}"
            safe_name="${app//\//-}"
            json_report="artifacts/trivy/reports/${safe_name}-${IMAGE_TAG}.json"
            sarif_report="artifacts/trivy/reports/${safe_name}-${IMAGE_TAG}.sarif"
            trivy_stderr="artifacts/trivy/reports/${safe_name}-${IMAGE_TAG}.stderr.log"

            echo "::group::Scan ${image_ref}"

            # Check the image exists locally before scanning
            if ! docker image inspect "$image_ref" >/dev/null 2>&1; then
              echo "::warning title=Trivy Skipped::Image not found locally — skipping scan for ${image_ref}"
              echo "| \`${app}\` | \`${image_ref}\` | — | — | \`skipped-missing-image\` |" >> "$GITHUB_STEP_SUMMARY"
              skipped_missing=$((skipped_missing + 1))
              echo "::endgroup::"
              continue
            fi

            # Run JSON scan (used for gate logic + summary)
            echo "Running JSON scan…"
            if ! trivy image \
                --ignorefile .trivyignore.yaml \
                --ignore-unfixed \
                --scanners vuln \
                --format json \
                --output "$json_report" \
                "$image_ref" 2>"$trivy_stderr"; then
              cat "$trivy_stderr" >&2
              echo "::error title=Trivy scan error [${app}]::trivy exited non-zero while scanning ${image_ref}. Check the step log for details."
              echo "| \`${app}\` | \`${image_ref}\` | ? | ? | \`scan-error\` |" >> "$GITHUB_STEP_SUMMARY"
              failed=1
              echo "::endgroup::"
              continue
            fi
            # Surface any trivy warnings even on success
            [[ -s "$trivy_stderr" ]] && cat "$trivy_stderr" >&2

            # Run SARIF scan (for GitHub Code Scanning upload)
            echo "Running SARIF scan…"
            trivy image \
              --ignorefile .trivyignore.yaml \
              --ignore-unfixed \
              --scanners vuln \
              --format sarif \
              --output "$sarif_report" \
              "$image_ref" 2>>"$trivy_stderr" || true

            # Parse counts
            critical_count="$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' "$json_report")"
            high_count="$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' "$json_report")"
            total_critical=$((total_critical + critical_count))
            total_high=$((total_high + high_count))

            gate="✅ pass"
            if (( critical_count > 0 || high_count > 0 )); then
              gate="❌ fail"
              failed=1

              # Emit a GitHub error annotation for the image
              echo "::error title=Security gate failed [${app}]::${image_ref} has ${critical_count} CRITICAL and ${high_count} HIGH vulnerabilities. See job summary for details."

              # Print a detail table of failing CVEs to the log
              echo "--- Failing CVEs for ${image_ref} ---"
              jq -r '
                .Results[]? |
                .Target as $tgt |
                .Vulnerabilities[]? |
                select(.Severity == "CRITICAL" or .Severity == "HIGH") |
                "  [\(.Severity)] \(.VulnerabilityID)  pkg=\(.PkgName)  installed=\(.InstalledVersion)  fixed=\(.FixedVersion // "no-fix")  \(.Title // "")"
              ' "$json_report"
              echo "--------------------------------------"

              # Append CVE detail table to the step summary
              {
                echo ""
                echo "### ❌ \`${app}\` — Failing CVEs"
                echo ""
                echo "| Severity | CVE | Package | Installed | Fixed | Title |"
                echo "|---|---|---|---|---|---|"
                jq -r '
                  .Results[]? |
                  .Vulnerabilities[]? |
                  select(.Severity == "CRITICAL" or .Severity == "HIGH") |
                  "| \(.Severity) | [\(.VulnerabilityID)](https://avd.aquasec.com/nvd/\(.VulnerabilityID | ascii_downcase)) | `\(.PkgName)` | `\(.InstalledVersion)` | `\(.FixedVersion // "none")` | \(.Title // "") |"
                ' "$json_report"
              } >> "$GITHUB_STEP_SUMMARY"
            fi

            echo "| \`${app}\` | \`${image_ref}\` | ${critical_count} | ${high_count} | \`${gate}\` |" >> "$GITHUB_STEP_SUMMARY"
            echo "::endgroup::"
          done < <(printf '%s\n' "$projects")

          # ── Aggregate summary footer ───────────────────────────────────────
          {
            echo ""
            echo "---"
            echo "**Aggregate CRITICAL:** ${total_critical}  |  **Aggregate HIGH:** ${total_high}  |  **Skipped (missing image):** ${skipped_missing}"
          } >> "$GITHUB_STEP_SUMMARY"

          # ── Gate decision ──────────────────────────────────────────────────
          if (( failed == 1 )); then
            echo "scan_gate_status=failed" >> "$GITHUB_OUTPUT"
            echo "::error::Security gate FAILED — ${total_critical} CRITICAL and ${total_high} HIGH vulnerabilities detected across all images. Rebuild images with patched base layers before publishing."
            exit 1
          fi

          echo "scan_gate_status=passed" >> "$GITHUB_OUTPUT"
          echo "::notice::Security gate PASSED — no CRITICAL or HIGH vulnerabilities detected."

      - name: Initialize release version for Docker
        shell: bash
        run: |
          set -euo pipefail
          image_tag="${{ steps.publish-context.outputs.image_tag }}"
          # Initialize ephemeral release version to satisfy the publish executor.
          # Using 0.0.0-<tag> to ensure it's a valid semver string for Nx Release.
          pnpm nx release version "0.0.0-${image_tag}" --stage-changes=false --git-commit=false --git-tag=false

          # Manually create .docker-version files to satisfy the @nx/docker:release-publish executor,
          # bypassing the problematic docker tag behavior of the nx release version command.
          while IFS= read -r project; do
            root=$(pnpm nx show project "$project" --json | jq -r .root)
            mkdir -p "tmp/$root"
            echo "${image_tag}" > "tmp/$root/.docker-version"
            echo "Created tmp/$root/.docker-version with tag ${image_tag}"
          done < <(pnpm nx show projects --withTarget nx-release-publish --json | jq -r '.[] | select(startswith("@ethio-connect/"))')

      - name: Publish images (Stage B)
        shell: bash
        env:
          IMAGE_TAG: ${{ steps.publish-context.outputs.image_tag }}
          BRANCH_TAG: ${{ steps.publish-context.outputs.branch_label }}
          BUILD_NUMBER: ${{ github.run_number }}
          COMMIT_SHA: ${{ github.sha }}
          BUILD_DATE: ${{ steps.publish-context.outputs.build_date }}
          VERSION: ${{ steps.publish-context.outputs.image_tag }}
          NX_IMAGE_TAG: ${{ steps.publish-context.outputs.image_tag }}
          NX_DOCKER_TAG: ${{ steps.publish-context.outputs.image_tag }}
          NX_DOCKER_VERSION: ${{ steps.publish-context.outputs.image_tag }}
          NX_DOCKER_BRANCH_TAG: ${{ steps.publish-context.outputs.branch_label }}
          NX_DOCKER_VERSION_SCHEME: production
          RELEASE_VERSION: ${{ steps.publish-context.outputs.canonical_release_version }}
        run: |
          set -euo pipefail
          projects=$(jq -r 'join(",")' <<< '${{ inputs.projects_json }}')
          [[ -n "$projects" ]] || { echo 'No release publish projects to process.'; exit 0; }
          pnpm nx run-many -t nx-release-publish --projects "$projects" --outputStyle=static

      - name: Upload container scan reports
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808
        with:
          name: trivy-scan-reports-${{ inputs.ref_name }}-${{ github.run_id }}
          path: artifacts/trivy/reports
          retention-days: 30

      - name: Verify published tags resolve to immutable manifests
        shell: bash
        env:
          IMAGE_TAG: ${{ steps.publish-context.outputs.image_tag }}
          BRANCH_TAG: ${{ steps.publish-context.outputs.branch_label }}
        run: |
          set -euo pipefail
          while IFS= read -r project; do
            app="${project#@ethio-connect/}"
            image_ref="ghcr.io/ethio-connect-et/${app}:${IMAGE_TAG}"
            branch_ref="ghcr.io/ethio-connect-et/${app}:${BRANCH_TAG}"
            image_digest="$(docker buildx imagetools inspect "$image_ref" --format '{{json .Manifest.Digest}}' | tr -d '"')"
            branch_digest="$(docker buildx imagetools inspect "$branch_ref" --format '{{json .Manifest.Digest}}' | tr -d '"')"

            [[ "$image_digest" =~ ^sha256:[a-f0-9]{64}$ ]] || { echo "::error::Invalid digest for $image_ref: $image_digest"; exit 1; }
            [[ "$branch_digest" =~ ^sha256:[a-f0-9]{64}$ ]] || { echo "::error::Invalid digest for $branch_ref: $branch_digest"; exit 1; }
            [[ "$image_digest" == "$branch_digest" ]] || { echo "::error::Digest mismatch for $app between ${IMAGE_TAG} and ${BRANCH_TAG}"; exit 1; }

            echo "Verified $app => $image_digest"
          done < <(jq -r '.[]' <<< '${{ inputs.projects_json }}')

      - name: Summarize published images
        shell: bash
        run: |
          set -euo pipefail
          image_tag="${{ steps.publish-context.outputs.image_tag }}"
          {
            echo "## Published Images"
            echo ""
            echo "| Project | Image Tag |"
            echo "|---|---|"
            pnpm nx show projects --withTarget nx-release-publish | awk '/^@ethio-connect\// { printf("| `%s` | `%s` |\n", $0, "'"$image_tag"'") }'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create publish manifest artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          image_tag="${{ steps.publish-context.outputs.image_tag }}"
          manifest_path="artifacts/publish-manifest-${{ inputs.ref_name }}-${{ github.run_id }}.json"
          while IFS= read -r project; do
            app="${project#@ethio-connect/}"
            image_ref="ghcr.io/ethio-connect-et/${app}:${image_tag}"
            digest="$(docker buildx imagetools inspect "$image_ref" --format '{{json .Manifest.Digest}}' | tr -d '"')"
            jq -nc \
              --arg project "$project" \
              --arg app "$app" \
              --arg image_ref "$image_ref" \
              --arg digest "$digest" \
              --arg source_sha "${GITHUB_SHA}" \
              --arg tag "$image_tag" \
              --arg short_sha "${{ steps.publish-context.outputs.short_sha }}" \
              --arg canonical_release_version "${{ steps.publish-context.outputs.canonical_release_version }}" \
              --arg artifact_run_id "${GITHUB_RUN_ID}" \
              '{project:$project,app:$app,image_ref:$image_ref,digest:$digest,source_sha:$source_sha,tag:$tag,short_sha:$short_sha,canonical_release_version:$canonical_release_version,artifact_run_id:$artifact_run_id,attestation_status:"not-required"}'
          done < <(jq -r '.[]' <<< '${{ inputs.projects_json }}') | jq -sc . > "$manifest_path"

      - name: Upload publish manifest artifact
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808
        with:
          name: publish-manifest-${{ inputs.ref_name }}-${{ github.run_id }}
          path: artifacts/publish-manifest-${{ inputs.ref_name }}-${{ github.run_id }}.json
          retention-days: 30
