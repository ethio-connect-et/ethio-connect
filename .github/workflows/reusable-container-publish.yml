name: Reusable Container Publish

on:
  workflow_call:
    inputs:
      projects_json:
        required: true
        type: string
      tag_context_json:
        required: true
        type: string
      ref_name:
        required: true
        type: string
      event_name:
        required: true
        type: string
      nx_base:
        required: true
        type: string
      nx_head:
        required: true
        type: string
    secrets:
      NX_CLOUD_ACCESS_TOKEN:
        required: true
    outputs:
      image_tag:
        description: 'The Docker image tag generated during publishing.'
        value: ${{ jobs.container_publish.outputs.image_tag }}
      short_sha:
        description: 'Immutable short commit SHA tag emitted for all images.'
        value: ${{ jobs.container_publish.outputs.short_sha }}
      canonical_release_version:
        description: 'Canonical release version tag (SemVer for main, SemVer prerelease for non-main).'
        value: ${{ jobs.container_publish.outputs.canonical_release_version }}

env:
  CI: true
  NODE_VERSION: '24.11.0'
  PNPM_VERSION: '10.20.0'
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
  DOCKER_BUILDKIT: 1

jobs:
  container_publish:
    name: Container · Publish
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.publish-context.outputs.image_tag }}
      short_sha: ${{ steps.publish-context.outputs.short_sha }}
      canonical_release_version: ${{ steps.publish-context.outputs.canonical_release_version }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v4.2.2
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-nx-node
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Set publish context
        id: publish-context
        shell: bash
        run: |
          set -euo pipefail
          branch_label="$(echo '${{ inputs.ref_name }}' | tr '[:upper:]' '[:lower:]' | sed 's#[^a-z0-9_.-]#-#g')"
          short_sha="$(git rev-parse --short=12 "${GITHUB_SHA}")"
          if [[ "${{ inputs.ref_name }}" == "main" ]]; then
            canonical_release_version="0.0.0+${short_sha}"
            image_tag="${canonical_release_version}"
          else
            canonical_release_version="0.0.0-${branch_label}.${short_sha}"
            image_tag="${canonical_release_version}"
          fi
          {
            echo "image_tag=${image_tag}"
            echo "short_sha=${short_sha}"
            echo "branch_label=${branch_label}"
            echo "canonical_release_version=${canonical_release_version}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.11.1
      - name: Log in to GHCR
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          {
            registry: ghcr.io,
            username: '${{ github.actor }}',
            password: '${{ secrets.GITHUB_TOKEN }}',
          }

      - name: Build images (Stage A)
        shell: bash
        env:
          IMAGE_TAG: ${{ steps.publish-context.outputs.image_tag }}
          BRANCH_TAG: ${{ steps.publish-context.outputs.branch_label }}
          BUILD_NUMBER: ${{ github.run_number }}
          COMMIT_SHA: ${{ github.sha }}
          VERSION: ${{ steps.publish-context.outputs.image_tag }}
          NX_IMAGE_TAG: ${{ steps.publish-context.outputs.image_tag }}
          NX_DOCKER_TAG: ${{ steps.publish-context.outputs.image_tag }}
          NX_DOCKER_VERSION: ${{ steps.publish-context.outputs.image_tag }}
          NX_DOCKER_IMAGE_REF: ${{ format('{0}:{1}', 'ghcr.io/ethio-connect-et', steps.publish-context.outputs.image_tag) }}
          NX_DOCKER_BRANCH_TAG: ${{ steps.publish-context.outputs.branch_label }}
          NX_DOCKER_VERSION_SCHEME: production
          RELEASE_VERSION: ${{ steps.publish-context.outputs.canonical_release_version }}
          CANONICAL_RELEASE_VERSION: ${{ steps.publish-context.outputs.canonical_release_version }}
        run: |
          set -euo pipefail
          projects=$(jq -r 'join(",")' <<< '${{ inputs.projects_json }}')
          [[ -n "$projects" ]] || {
            echo 'No docker build projects in optimization hint; writing deterministic skip artifact.'
            echo '{"lane":"docker_build","status":"skipped-no-affected"}' > ci-metrics-docker-build.json
            exit 0
          }
          [[ -n "${IMAGE_TAG:-}" ]] || { echo "::error::IMAGE_TAG is required"; exit 1; }
          [[ -n "${BRANCH_TAG:-}" ]] || { echo "::error::BRANCH_TAG is required"; exit 1; }
          [[ "$IMAGE_TAG" != "latest" ]] || { echo "::error::IMAGE_TAG must not be latest"; exit 1; }
          [[ "$BRANCH_TAG" != "latest" ]] || { echo "::error::BRANCH_TAG must not be latest"; exit 1; }
          pnpm nx run-many -t docker:build --projects "$projects" --outputStyle=static

      - name: Summarize build stage success
        if: ${{ success() }}
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "## Build Stage"
            echo ""
            echo "- Target: \`docker:build\`"
            echo "- Projects input: \`${{ inputs.projects_json }}\`"
            echo "- Image tag: \`${{ steps.publish-context.outputs.image_tag }}\`"
            echo "- Canonical release version: \`${{ steps.publish-context.outputs.canonical_release_version }}\`"
            echo ""
            echo "✅ Build stage completed successfully."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Summarize build stage failure
        if: ${{ failure() }}
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "## Build Stage"
            echo ""
            echo "- Target: \`docker:build\`"
            echo "- Projects input: \`${{ inputs.projects_json }}\`"
            echo "- Image tag: \`${{ steps.publish-context.outputs.image_tag }}\`"
            echo "- Canonical release version: \`${{ steps.publish-context.outputs.canonical_release_version }}\`"
            echo ""
            echo "❌ Build stage failed."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build immutable image metadata
        id: image-metadata
        shell: bash
        run: |
          set -euo pipefail
          metadata_path="artifacts/publish-image-metadata-${{ inputs.ref_name }}-${{ github.run_id }}.json"
          pnpm nx run @ethio-connect/source:container:image-metadata -- \
            --mode generate-publish-metadata \
            --projects-json '${{ inputs.projects_json }}' \
            --image-tag '${{ steps.publish-context.outputs.image_tag }}' \
            --release-version '${{ steps.publish-context.outputs.canonical_release_version }}' \
            --source-sha '${{ github.sha }}' \
            --output "$metadata_path"
          echo "path=$metadata_path" >> "$GITHUB_OUTPUT"

      - name: Upload publish image metadata artifact
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808
        with:
          name: publish-image-metadata-${{ inputs.ref_name }}-${{ github.run_id }}
          path: ${{ steps.image-metadata.outputs.path }}
          retention-days: 14

      - name: Upload docker lane skip marker
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808
        with:
          name: ci-metrics-docker-build
          path: ci-metrics-docker-build.json
          if-no-files-found: ignore

      - name: Set up Trivy (pinned + validated asset resolution)
        shell: bash
        env:
          TRIVY_VERSION: '0.70.0'
          TRIVY_LINUX_AMD64_DEB_SHA256: 'a9f6ce99fa942759ee914d821b9ad38b6d6887e7d1b4d4415c1c9c7387c7bc94'
          TRIVY_LINUX_AMD64_TAR_GZ_SHA256: '8b4376d5d6befe5c24d503f10ff136d9e0c49f9127a4279fd110b727929a5aa9'
        run: |
          set -euo pipefail

          release_tag="v${TRIVY_VERSION}"
          release_api="https://api.github.com/repos/aquasecurity/trivy/releases/tags/${release_tag}"

          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "$tmp_dir"' EXIT

          release_json="${tmp_dir}/release.json"
          curl -fsSL "${release_api}" -o "${release_json}"
          mapfile -t available_assets < <(jq -r '.assets[].name' "${release_json}")

          if [[ ${#available_assets[@]} -eq 0 ]]; then
            echo "::error::No release assets found for ${release_tag}."
            exit 1
          fi

          deb_pattern='^trivy_.*_Linux-64bit\.deb$'
          tar_pattern='^trivy_.*_Linux-64bit\.tar\.gz$'

          installer_method="deb"
          installer_name="$(jq -r --arg re "${deb_pattern}" '.assets[] | select(.name | test($re)) | .name' "${release_json}" | head -n1)"
          installer_url="$(jq -r --arg re "${deb_pattern}" '.assets[] | select(.name | test($re)) | .browser_download_url' "${release_json}" | head -n1)"
          expected_sha256="${TRIVY_LINUX_AMD64_DEB_SHA256}"

          if [[ -z "${installer_name}" || -z "${installer_url}" ]]; then
            installer_method="fallback-tarball"
            installer_name="$(jq -r --arg re "${tar_pattern}" '.assets[] | select(.name | test($re)) | .name' "${release_json}" | head -n1)"
            installer_url="$(jq -r --arg re "${tar_pattern}" '.assets[] | select(.name | test($re)) | .browser_download_url' "${release_json}" | head -n1)"
            expected_sha256="${TRIVY_LINUX_AMD64_TAR_GZ_SHA256}"
          fi

          if [[ -z "${installer_name}" || -z "${installer_url}" ]]; then
            echo "::error::No matching Trivy Linux amd64 installer asset found for ${release_tag}."
            echo "::error::Looked for patterns: ${deb_pattern} (preferred), ${tar_pattern} (fallback)."
            echo "::error::Available assets: ${available_assets[*]}"
            exit 1
          fi

          if [[ "${expected_sha256}" == REPLACE_WITH_* || -z "${expected_sha256}" ]]; then
            echo "::error::Pinned SHA256 is not configured for ${installer_method} asset (${installer_name})."
            echo "::error::Set TRIVY_LINUX_AMD64_DEB_SHA256 and TRIVY_LINUX_AMD64_TAR_GZ_SHA256 alongside TRIVY_VERSION."
            exit 1
          fi

          installer_path="${tmp_dir}/${installer_name}"
          echo "Resolved Trivy installer:"
          echo "  method=${installer_method}"
          echo "  version=${release_tag}"
          echo "  asset=${installer_name}"
          echo "  url=${installer_url}"

          curl -fsSL "${installer_url}" -o "${installer_path}"
          actual_sha256="$(sha256sum "${installer_path}" | awk '{print $1}')"
          [[ "${actual_sha256}" == "${expected_sha256}" ]] || {
            echo "::error::SHA256 verification failed for ${installer_name}."
            echo "::error::Expected ${expected_sha256}, got ${actual_sha256}."
            exit 1
          }

          if [[ "${installer_method}" == "deb" ]]; then
            sudo dpkg -i "${installer_path}"
          else
            tar -xzf "${installer_path}" -C "${tmp_dir}" trivy
            sudo install -m 0755 "${tmp_dir}/trivy" /usr/local/bin/trivy
          fi

      - name: Security scan built container images (Trivy gate)
        id: scan-gate
        shell: bash
        env:
          IMAGE_TAG: ${{ steps.publish-context.outputs.image_tag }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/trivy/reports

          projects="$(jq -r '.[]' <<< '${{ inputs.projects_json }}')"
          [[ -n "$projects" ]] || {
            echo "scan_gate_status=skipped-no-projects" >> "$GITHUB_OUTPUT"
            echo "::notice::Trivy gate skipped — no projects to scan."
            exit 0
          }

          echo "::group::Trivy version"
          trivy --version
          echo "::endgroup::"

          # ── Summary header ─────────────────────────────────────────────────
          failed=0
          total_critical=0
          total_high=0
          skipped_missing=0
          {
            echo "## Container Security Scan (Trivy)"
            echo ""
            echo "| App | Image Ref | CRITICAL | HIGH | Gate |"
            echo "|---|---|---:|---:|---|"
          } >> "$GITHUB_STEP_SUMMARY"

          # ── Per-image scan loop ────────────────────────────────────────────
          while IFS= read -r project; do
            app="${project#@ethio-connect/}"
            image_ref="ghcr.io/ethio-connect-et/${app}:${IMAGE_TAG}"
            safe_name="${app//\//-}"
            json_report="artifacts/trivy/reports/${safe_name}-${IMAGE_TAG}.json"
            sarif_report="artifacts/trivy/reports/${safe_name}-${IMAGE_TAG}.sarif"
            trivy_stderr="artifacts/trivy/reports/${safe_name}-${IMAGE_TAG}.stderr.log"

            echo "::group::Scan ${image_ref}"

            # Check the image exists locally before scanning
            if ! docker image inspect "$image_ref" >/dev/null 2>&1; then
              echo "::warning title=Trivy Skipped::Image not found locally — skipping scan for ${image_ref}"
              echo "| \`${app}\` | \`${image_ref}\` | — | — | \`skipped-missing-image\` |" >> "$GITHUB_STEP_SUMMARY"
              skipped_missing=$((skipped_missing + 1))
              echo "::endgroup::"
              continue
            fi

            # Run JSON scan (used for gate logic + summary)
            echo "Running JSON scan…"
            if ! trivy image \
                --ignorefile .trivyignore.yaml \
                --ignore-unfixed \
                --scanners vuln \
                --format json \
                --output "$json_report" \
                "$image_ref" 2>"$trivy_stderr"; then
              cat "$trivy_stderr" >&2
              echo "::error title=Trivy scan error [${app}]::trivy exited non-zero while scanning ${image_ref}. Check the step log for details."
              echo "| \`${app}\` | \`${image_ref}\` | ? | ? | \`scan-error\` |" >> "$GITHUB_STEP_SUMMARY"
              failed=1
              echo "::endgroup::"
              continue
            fi
            # Surface any trivy warnings even on success
            [[ -s "$trivy_stderr" ]] && cat "$trivy_stderr" >&2

            # Run SARIF scan (for GitHub Code Scanning upload)
            echo "Running SARIF scan…"
            trivy image \
              --ignorefile .trivyignore.yaml \
              --ignore-unfixed \
              --scanners vuln \
              --format sarif \
              --output "$sarif_report" \
              "$image_ref" 2>>"$trivy_stderr" || true

            # Parse counts
            critical_count="$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' "$json_report")"
            high_count="$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' "$json_report")"
            total_critical=$((total_critical + critical_count))
            total_high=$((total_high + high_count))

            gate="✅ pass"
            if (( critical_count > 0 || high_count > 0 )); then
              gate="❌ fail"
              failed=1

              # Emit a GitHub error annotation for the image
              echo "::error title=Security gate failed [${app}]::${image_ref} has ${critical_count} CRITICAL and ${high_count} HIGH vulnerabilities. See job summary for details."

              # Print a detail table of failing CVEs to the log
              echo "--- Failing CVEs for ${image_ref} ---"
              jq -r '
                .Results[]? |
                .Target as $tgt |
                .Vulnerabilities[]? |
                select(.Severity == "CRITICAL" or .Severity == "HIGH") |
                "  [\(.Severity)] \(.VulnerabilityID)  pkg=\(.PkgName)  installed=\(.InstalledVersion)  fixed=\(.FixedVersion // "no-fix")  \(.Title // "")"
              ' "$json_report"
              echo "--------------------------------------"

              # Append CVE detail table to the step summary
              {
                echo ""
                echo "### ❌ \`${app}\` — Failing CVEs"
                echo ""
                echo "| Severity | CVE | Package | Installed | Fixed | Title |"
                echo "|---|---|---|---|---|---|"
                jq -r '
                  .Results[]? |
                  .Vulnerabilities[]? |
                  select(.Severity == "CRITICAL" or .Severity == "HIGH") |
                  "| \(.Severity) | [\(.VulnerabilityID)](https://avd.aquasec.com/nvd/\(.VulnerabilityID | ascii_downcase)) | `\(.PkgName)` | `\(.InstalledVersion)` | `\(.FixedVersion // "none")` | \(.Title // "") |"
                ' "$json_report"
              } >> "$GITHUB_STEP_SUMMARY"
            fi

            echo "| \`${app}\` | \`${image_ref}\` | ${critical_count} | ${high_count} | \`${gate}\` |" >> "$GITHUB_STEP_SUMMARY"
            echo "::endgroup::"
          done < <(printf '%s\n' "$projects")

          # ── Aggregate summary footer ───────────────────────────────────────
          {
            echo ""
            echo "---"
            echo "**Aggregate CRITICAL:** ${total_critical}  |  **Aggregate HIGH:** ${total_high}  |  **Skipped (missing image):** ${skipped_missing}"
          } >> "$GITHUB_STEP_SUMMARY"

          # ── Gate decision ──────────────────────────────────────────────────
          if (( failed == 1 )); then
            echo "scan_gate_status=failed" >> "$GITHUB_OUTPUT"
            echo "::error::Security gate FAILED — ${total_critical} CRITICAL and ${total_high} HIGH vulnerabilities detected across all images. Rebuild images with patched base layers before publishing."
            exit 1
          fi

          echo "scan_gate_status=passed" >> "$GITHUB_OUTPUT"
          echo "::notice::Security gate PASSED — no CRITICAL or HIGH vulnerabilities detected."

      - name: Initialize release version for Docker (Publish Stage)
        if: ${{ inputs.event_name != 'pull_request' && (inputs.ref_name == 'testing' || inputs.ref_name == 'staging' || inputs.ref_name == 'main') }}
        shell: bash
        run: |
          set -euo pipefail
          image_tag="${{ steps.publish-context.outputs.image_tag }}"
          # Initialize ephemeral release version to satisfy the publish executor.
          # Using 0.0.0-<tag> to ensure it's a valid semver string for Nx Release.
          pnpm nx release version "0.0.0-${image_tag}" --stage-changes=false --git-commit=false --git-tag=false

          # Manually create .docker-version files to satisfy the @nx/docker:release-publish executor,
          # bypassing the problematic docker tag behavior of the nx release version command.
          while IFS= read -r project; do
            root=$(pnpm nx show project "$project" --json | jq -r .root)
            mkdir -p "tmp/$root"
            echo "${image_tag}" > "tmp/$root/.docker-version"
            echo "Created tmp/$root/.docker-version with tag ${image_tag}"
          done < <(pnpm nx show projects --withTarget nx-release-publish --json | jq -r '.[] | select(startswith("@ethio-connect/"))')


      - name: Validate release target contracts (Publish Stage)
        if: ${{ inputs.event_name != 'pull_request' && (inputs.ref_name == 'testing' || inputs.ref_name == 'staging' || inputs.ref_name == 'main') }}
        shell: bash
        run: |
          set -euo pipefail
          node tools/ci/validate-project-targets.mjs \
            --mode publish-target-contract \
            --projects-json '${{ inputs.projects_json }}' \
            --report-path release-target-contract-report.json

      - name: Upload release target contract report
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808
        with:
          name: release-target-contract-report-${{ inputs.ref_name }}-${{ github.run_id }}
          path: release-target-contract-report.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Publish images (Publish Stage)
        if: ${{ inputs.event_name != 'pull_request' && (inputs.ref_name == 'testing' || inputs.ref_name == 'staging' || inputs.ref_name == 'main') }}
        shell: bash
        env:
          IMAGE_TAG: ${{ steps.publish-context.outputs.image_tag }}
          BRANCH_TAG: ${{ steps.publish-context.outputs.branch_label }}
          BUILD_NUMBER: ${{ github.run_number }}
          COMMIT_SHA: ${{ github.sha }}
          VERSION: ${{ steps.publish-context.outputs.image_tag }}
          NX_IMAGE_TAG: ${{ steps.publish-context.outputs.image_tag }}
          NX_DOCKER_TAG: ${{ steps.publish-context.outputs.image_tag }}
          NX_DOCKER_VERSION: ${{ steps.publish-context.outputs.image_tag }}
          NX_DOCKER_IMAGE_REF: ${{ format('{0}:{1}', 'ghcr.io/ethio-connect-et', steps.publish-context.outputs.image_tag) }}
          NX_DOCKER_BRANCH_TAG: ${{ steps.publish-context.outputs.branch_label }}
          NX_DOCKER_VERSION_SCHEME: production
          RELEASE_VERSION: ${{ steps.publish-context.outputs.canonical_release_version }}
          CANONICAL_RELEASE_VERSION: ${{ steps.publish-context.outputs.canonical_release_version }}
        run: |
          set -euo pipefail
          projects=$(jq -r 'join(",")' <<< '${{ inputs.projects_json }}')
          [[ -n "$projects" ]] || { echo 'No release publish projects to process.'; exit 0; }
          pnpm nx run-many -t nx-release-publish --projects "$projects" --outputStyle=static

      - name: Upload container scan reports
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808
        with:
          name: trivy-scan-reports-${{ inputs.ref_name }}-${{ github.run_id }}
          path: artifacts/trivy/reports
          retention-days: 30

      - name: Verify published tags resolve to immutable manifests (Publish Stage)
        if: ${{ inputs.event_name != 'pull_request' && (inputs.ref_name == 'testing' || inputs.ref_name == 'staging' || inputs.ref_name == 'main') }}
        shell: bash
        run: |
          set -euo pipefail
          pnpm nx run @ethio-connect/source:container:image-metadata -- \
            --mode verify-tag-parity \
            --projects-json '${{ inputs.projects_json }}' \
            --primary-tag '${{ steps.publish-context.outputs.image_tag }}' \
            --secondary-tag '${{ steps.publish-context.outputs.branch_label }}'

      - name: Summarize publish stage
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          image_tag="${{ steps.publish-context.outputs.image_tag }}"
          should_publish="false"
          if [[ "${{ inputs.event_name }}" != "pull_request" && ( "${{ inputs.ref_name }}" == "testing" || "${{ inputs.ref_name }}" == "staging" || "${{ inputs.ref_name }}" == "main" ) ]]; then
            should_publish="true"
          fi
          {
            echo "## Publish Stage"
            echo ""
            echo "- Target: \`nx-release-publish\`"
            echo "- Event: \`${{ inputs.event_name }}\`"
            echo "- Branch: \`${{ inputs.ref_name }}\`"
            echo "- Trusted branch gate (\`testing\`, \`staging\`, \`main\` + non-PR): \`${should_publish}\`"
            echo ""
            if [[ "${should_publish}" == "true" ]]; then
              echo "✅ Publish stage completed successfully."
              echo ""
              echo "| Project | Image Tag |"
              echo "|---|---|"
              pnpm nx show projects --withTarget nx-release-publish | awk '/^@ethio-connect\// { printf("| `%s` | `%s` |\n", $0, "'"$image_tag"'") }'
            else
              echo "⚠️ Publish stage skipped by trust gate."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
