name: Reusable Container Publish

on:
  workflow_call:
    inputs:
      ref_name:
        required: true
        type: string
      event_name:
        required: true
        type: string
    secrets:
      NX_CLOUD_ACCESS_TOKEN:
        required: true
    outputs:
      image_tag:
        description: 'The Docker image tag generated during publishing.'
        value: ${{ jobs.container_publish.outputs.image_tag }}

env:
  CI: true
  NODE_VERSION: '24.11.0'
  PNPM_VERSION: '10.20.0'
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
  DOCKER_BUILDKIT: 1

jobs:
  container_publish:
    name: Container · Publish
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.publish-context.outputs.image_tag }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with: { fetch-depth: 0, filter: 'tree:0' }

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with: { version: '${{ env.PNPM_VERSION }}', run_install: false }

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          {
            node-version: '${{ env.NODE_VERSION }}',
            cache: pnpm,
            cache-dependency-path: pnpm-lock.yaml,
          }

      - name: Install dependencies
        run: pnpm fetch --frozen-lockfile && pnpm install --frozen-lockfile --prefer-offline

      - name: Set publish context
        id: publish-context
        shell: bash
        run: |
          set -euo pipefail
          branch_label="$(echo '${{ inputs.ref_name }}' | tr '[:upper:]' '[:lower:]' | sed 's#[^a-z0-9_.-]#-#g')"
          short_sha="$(git rev-parse --short=12 "${GITHUB_SHA}")"
          image_tag="${branch_label}-${short_sha}"
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "branch_label=${branch_label}" >> "$GITHUB_OUTPUT"
          echo "build_date=${build_date}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          {
            registry: ghcr.io,
            username: '${{ github.actor }}',
            password: '${{ secrets.GITHUB_TOKEN }}',
          }

      - name: Build images (Stage A)
        shell: bash
        env:
          NX_DOCKER_VERSION_SCHEME: production
          NX_IMAGE_TAG: ${{ steps.publish-context.outputs.image_tag }}
          NX_DOCKER_TAG: ${{ steps.publish-context.outputs.image_tag }}
          NX_DOCKER_VERSION: ${{ steps.publish-context.outputs.image_tag }}
          NX_DOCKER_BRANCH_TAG: ${{ steps.publish-context.outputs.branch_label }}
          NX_DOCKER_LABEL_BUILD_NUMBER: ${{ github.run_number }}
          NX_DOCKER_LABEL_COMMIT_SHA: ${{ github.sha }}
          NX_DOCKER_LABEL_BUILD_DATE: ${{ steps.publish-context.outputs.build_date }}
        run: |
          set -euo pipefail
          pnpm nx run-many -t docker:build --all --outputStyle=static

      - name: Publish images (Stage B)
        shell: bash
        env:
          NX_DOCKER_VERSION_SCHEME: production
          NX_IMAGE_TAG: ${{ steps.publish-context.outputs.image_tag }}
          NX_DOCKER_TAG: ${{ steps.publish-context.outputs.image_tag }}
          NX_DOCKER_VERSION: ${{ steps.publish-context.outputs.image_tag }}
          NX_DOCKER_BRANCH_TAG: ${{ steps.publish-context.outputs.branch_label }}
          NX_DOCKER_LABEL_BUILD_NUMBER: ${{ github.run_number }}
          NX_DOCKER_LABEL_COMMIT_SHA: ${{ github.sha }}
          NX_DOCKER_LABEL_BUILD_DATE: ${{ steps.publish-context.outputs.build_date }}
        run: |
          set -euo pipefail
          pnpm nx run-many -t nx-release-publish --all --outputStyle=static

      - name: Summarize published images
        shell: bash
        run: |
          set -euo pipefail
          image_tag="${{ steps.publish-context.outputs.image_tag }}"
          {
            echo "## Published Images"
            echo ""
            echo "| Project | Image Tag |"
            echo "|---|---|"
            pnpm nx show projects --withTarget nx-release-publish | awk '/^@ethio-connect\// { printf("| `%s` | `%s` |\n", $0, "'"$image_tag"'") }'
          } >> "$GITHUB_STEP_SUMMARY"
